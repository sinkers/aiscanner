<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter Infrastructure Provider Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: white;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a2f3e;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.9em;
            color: #a0a0a0;
            margin-top: 5px;
        }

        .controls {
            background: #1a1f2e;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #2a2f3e;
        }

        .control-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85em;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        input, select {
            padding: 12px;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            background: #0f1419;
            color: #e0e0e0;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #2a2f3e;
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab:hover {
            color: #e0e0e0;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        table {
            width: 100%;
            background: #1a1f2e;
            border-radius: 12px;
            overflow: hidden;
            border-collapse: collapse;
            border: 1px solid #2a2f3e;
        }

        th {
            background: #252b3d;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            user-select: none;
            position: relative;
            white-space: nowrap;
        }

        th:hover {
            background: #2a3146;
        }

        th.sortable::after {
            content: ' ⇅';
            opacity: 0.3;
            font-size: 0.8em;
        }

        th.sort-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sort-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        .filter-row th {
            background: #1e2433;
            padding: 8px;
            cursor: default;
        }

        .filter-row th:hover {
            background: #1e2433;
        }

        .filter-row th::after {
            content: '';
        }

        .column-filter {
            width: 100%;
            padding: 6px 8px;
            background: #0f1419;
            border: 1px solid #2a2f3e;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.9em;
        }

        .column-filter:focus {
            outline: none;
            border-color: #667eea;
        }

        .column-filter::placeholder {
            color: #6a6a6a;
        }

        td {
            padding: 15px;
            border-top: 1px solid #2a2f3e;
        }

        tr:hover {
            background: #1e2433;
        }

        .provider-name {
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            transition: color 0.2s;
        }

        .provider-name:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 5px;
        }

        .badge-us { background: #1e3a8a; color: #93c5fd; }
        .badge-cn { background: #7f1d1d; color: #fca5a5; }
        .badge-sg { background: #065f46; color: #6ee7b7; }
        .badge-fr { background: #3730a3; color: #c4b5fd; }
        .badge-il { background: #831843; color: #f9a8d4; }
        .badge-nl { background: #ea580c; color: #fed7aa; }
        .badge-uk { background: #1e40af; color: #bfdbfe; }
        .badge-unknown { background: #374151; color: #9ca3af; }

        .price {
            font-family: 'Courier New', monospace;
            color: #4ade80;
            font-weight: 600;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .metric-bar {
            height: 6px;
            background: #2a2f3e;
            border-radius: 3px;
            flex: 1;
            overflow: hidden;
        }

        .metric-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .metric-value {
            font-size: 0.9em;
            min-width: 60px;
            text-align: right;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1f2e;
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #2a2f3e;
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #2a2f3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .modal-header h2 {
            margin: 0;
            color: white;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-body {
            padding: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item {
            background: #0f1419;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2f3e;
        }

        .info-label {
            font-size: 0.85em;
            color: #a0a0a0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #e0e0e0;
        }

        .model-list {
            margin-top: 20px;
        }

        .model-list h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .model-item {
            background: #0f1419;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2f3e;
            margin-bottom: 10px;
        }

        .model-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .model-id {
            font-weight: 600;
            color: #e0e0e0;
        }

        .model-pricing {
            color: #4ade80;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .model-details {
            display: flex;
            gap: 20px;
            font-size: 0.85em;
            color: #a0a0a0;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2em;
            color: #667eea;
        }

        .filters-summary {
            background: #252b3d;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-filters {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .clear-filters:hover {
            background: #764ba2;
        }

        @media (max-width: 768px) {
            .control-row {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            h1 {
                font-size: 1.8em;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }
        }

        .compare-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.2s;
        }

        .compare-btn:hover {
            background: #764ba2;
        }

        .filter-hint {
            font-size: 0.75em;
            color: #6a6a6a;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 OpenRouter Infrastructure Provider Map</h1>
            <p class="subtitle">Comprehensive mapping of model hosting providers, pricing, and performance</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number">-</div>
                <div class="stat-label">Providers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">-</div>
                <div class="stat-label">Models</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">-</div>
                <div class="stat-label">Countries</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">-</div>
                <div class="stat-label">Avg Uptime</div>
            </div>
        </div>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label for="search">Global Search</label>
                    <input type="text" id="search" placeholder="Search providers or models...">
                </div>
                <div class="control-group">
                    <label for="location">Quick Location Filter</label>
                    <select id="location">
                        <option value="">All Locations</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="minModels">Min Models</label>
                    <input type="number" id="minModels" placeholder="0" min="0">
                </div>
                <div class="control-group">
                    <label for="minUptime">Min Uptime %</label>
                    <input type="number" id="minUptime" placeholder="0" min="0" max="100">
                </div>
            </div>
            <div class="filter-hint">💡 Tip: Use column filters below the table headers for precise filtering</div>
        </div>

        <div class="tabs">
            <button class="tab active" data-view="providers">All Providers</button>
            <button class="tab" data-view="geography">By Geography</button>
            <button class="tab" data-view="performance">Performance Leaders</button>
            <button class="tab" data-view="pricing">Pricing Comparison</button>
        </div>

        <div id="providers-view" class="view active">
            <div class="filters-summary" id="filters-summary" style="display: none;">
                <span id="filters-text"></span>
                <button class="clear-filters" onclick="clearFilters()">Clear All Filters</button>
            </div>
            <div id="providers-table-container"></div>
        </div>

        <div id="geography-view" class="view">
            <div id="geography-container"></div>
        </div>

        <div id="performance-view" class="view">
            <div id="performance-container"></div>
        </div>

        <div id="pricing-view" class="view">
            <div id="pricing-container"></div>
        </div>
    </div>

    <div class="modal" id="provider-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Provider Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Content will be dynamically inserted -->
            </div>
        </div>
    </div>

    <script>
        let infraData = null;
        let currentSort = { column: 'models', direction: 'desc' };
        let filteredProviders = [];
        let columnFilters = {
            provider: '',
            location: '',
            models: { min: '', max: '' },
            uptime: { min: '', max: '' },
            latency: { min: '', max: '' },
            price: { min: '', max: '' }
        };

        // Load data
        async function loadData() {
            try {
                const response = await fetch('infrastructure_provider_map.json');
                infraData = await response.json();
                initializeUI();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('providers-table-container').innerHTML =
                    '<div class="no-results">Error loading data. Make sure infrastructure_provider_map.json exists in the same directory.<br><br>If opening directly as a file, use index_standalone.html instead or run a web server.</div>';
            }
        }

        function initializeUI() {
            updateStats();
            populateLocationFilter();
            renderProvidersTable();
            renderGeographyView();
            renderPerformanceView();
            renderPricingView();

            // Setup event listeners
            document.getElementById('search').addEventListener('input', applyFilters);
            document.getElementById('location').addEventListener('change', applyFilters);
            document.getElementById('minModels').addEventListener('input', applyFilters);
            document.getElementById('minUptime').addEventListener('input', applyFilters);

            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.view));
            });
        }

        function updateStats() {
            const providers = Object.values(infraData.providers);
            const totalProviders = providers.length;
            const totalModels = infraData.models_with_endpoints;

            const countries = new Set(
                providers
                    .map(p => p.provider_info.headquarters)
                    .filter(h => h)
            );

            const uptimes = providers
                .map(p => p.performance_stats.avg_uptime)
                .filter(u => u !== null);
            const avgUptime = uptimes.length > 0
                ? (uptimes.reduce((a, b) => a + b, 0) / uptimes.length).toFixed(1)
                : 'N/A';

            const statCards = document.querySelectorAll('.stat-number');
            statCards[0].textContent = totalProviders;
            statCards[1].textContent = totalModels;
            statCards[2].textContent = countries.size;
            statCards[3].textContent = avgUptime !== 'N/A' ? avgUptime + '%' : 'N/A';
        }

        function populateLocationFilter() {
            const locations = new Set();
            Object.values(infraData.providers).forEach(p => {
                const hq = p.provider_info.headquarters;
                if (hq) locations.add(hq);
            });

            const select = document.getElementById('location');
            Array.from(locations).sort().forEach(loc => {
                const option = document.createElement('option');
                option.value = loc;
                option.textContent = loc;
                select.appendChild(option);
            });
        }

        function applyColumnFilter(column, value, type = 'text') {
            if (type === 'range') {
                columnFilters[column] = value; // value is {min, max}
            } else {
                columnFilters[column] = value;
            }
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('search').value.toLowerCase();
            const location = document.getElementById('location').value;
            const minModels = parseInt(document.getElementById('minModels').value) || 0;
            const minUptime = parseFloat(document.getElementById('minUptime').value) || 0;

            const providers = Object.entries(infraData.providers);

            filteredProviders = providers.filter(([name, data]) => {
                // Global search filter
                if (search) {
                    const matchesName = name.toLowerCase().includes(search);
                    const matchesModel = data.models.some(m =>
                        m.model_id.toLowerCase().includes(search) ||
                        m.model_name.toLowerCase().includes(search)
                    );
                    if (!matchesName && !matchesModel) return false;
                }

                // Quick location filter
                if (location && data.provider_info.headquarters !== location) {
                    return false;
                }

                // Quick min models filter
                if (data.total_models < minModels) return false;

                // Quick min uptime filter
                const uptime = data.performance_stats.avg_uptime;
                if (uptime && uptime < minUptime) return false;

                // Column filters
                // Provider name filter
                if (columnFilters.provider && !name.toLowerCase().includes(columnFilters.provider.toLowerCase())) {
                    return false;
                }

                // Location filter (column)
                if (columnFilters.location) {
                    const hq = data.provider_info.headquarters || '';
                    if (!hq.toLowerCase().includes(columnFilters.location.toLowerCase())) {
                        return false;
                    }
                }

                // Models filter
                if (columnFilters.models.min && data.total_models < parseInt(columnFilters.models.min)) {
                    return false;
                }
                if (columnFilters.models.max && data.total_models > parseInt(columnFilters.models.max)) {
                    return false;
                }

                // Uptime filter
                const uptimeVal = data.performance_stats.avg_uptime;
                if (columnFilters.uptime.min && (!uptimeVal || uptimeVal < parseFloat(columnFilters.uptime.min))) {
                    return false;
                }
                if (columnFilters.uptime.max && uptimeVal && uptimeVal > parseFloat(columnFilters.uptime.max)) {
                    return false;
                }

                // Latency filter
                const latencyVal = data.performance_stats.avg_latency_p50;
                if (columnFilters.latency.min && (!latencyVal || latencyVal < parseFloat(columnFilters.latency.min))) {
                    return false;
                }
                if (columnFilters.latency.max && latencyVal && latencyVal > parseFloat(columnFilters.latency.max)) {
                    return false;
                }

                // Price filter
                const totalPrice = data.pricing_range.min_prompt + data.pricing_range.min_completion;
                if (columnFilters.price.min && totalPrice < parseFloat(columnFilters.price.min)) {
                    return false;
                }
                if (columnFilters.price.max && totalPrice > parseFloat(columnFilters.price.max)) {
                    return false;
                }

                return true;
            });

            updateFiltersSummary(search, location, minModels, minUptime);
            renderProvidersTable();
        }

        function updateFiltersSummary(search, location, minModels, minUptime) {
            const hasGlobalFilters = search || location || minModels || minUptime;
            const hasColumnFilters =
                columnFilters.provider || columnFilters.location ||
                columnFilters.models.min || columnFilters.models.max ||
                columnFilters.uptime.min || columnFilters.uptime.max ||
                columnFilters.latency.min || columnFilters.latency.max ||
                columnFilters.price.min || columnFilters.price.max;

            const hasFilters = hasGlobalFilters || hasColumnFilters;
            const summary = document.getElementById('filters-summary');

            if (hasFilters) {
                const parts = [];
                if (search) parts.push(`Search: "${search}"`);
                if (location) parts.push(`Location: ${location}`);
                if (minModels) parts.push(`Min ${minModels} models`);
                if (minUptime) parts.push(`Min ${minUptime}% uptime`);
                if (hasColumnFilters) parts.push('Column filters active');

                document.getElementById('filters-text').textContent =
                    `Showing ${filteredProviders.length} of ${Object.keys(infraData.providers).length} providers${parts.length > 0 ? ' • ' + parts.join(' • ') : ''}`;
                summary.style.display = 'flex';
            } else {
                summary.style.display = 'none';
            }
        }

        function clearFilters() {
            // Clear global filters
            document.getElementById('search').value = '';
            document.getElementById('location').value = '';
            document.getElementById('minModels').value = '';
            document.getElementById('minUptime').value = '';

            // Clear column filters
            columnFilters = {
                provider: '',
                location: '',
                models: { min: '', max: '' },
                uptime: { min: '', max: '' },
                latency: { min: '', max: '' },
                price: { min: '', max: '' }
            };

            // Clear column filter inputs
            document.querySelectorAll('.column-filter').forEach(input => {
                input.value = '';
            });

            applyFilters();
        }

        function renderProvidersTable() {
            const providers = filteredProviders.length > 0
                ? filteredProviders
                : Object.entries(infraData.providers);

            // Sort
            const sortedProviders = [...providers].sort((a, b) => {
                const aVal = getSortValue(a[1], currentSort.column);
                const bVal = getSortValue(b[1], currentSort.column);

                if (aVal === null) return 1;
                if (bVal === null) return -1;

                const comparison = aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
                return currentSort.direction === 'asc' ? comparison : -comparison;
            });

            if (sortedProviders.length === 0) {
                document.getElementById('providers-table-container').innerHTML =
                    '<div class="no-results">No providers match your filters</div>';
                return;
            }

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th class="sortable ${currentSort.column === 'name' ? 'sort-' + currentSort.direction : ''}"
                                onclick="sortTable('name')">Provider</th>
                            <th class="sortable ${currentSort.column === 'location' ? 'sort-' + currentSort.direction : ''}"
                                onclick="sortTable('location')">Location</th>
                            <th class="sortable ${currentSort.column === 'models' ? 'sort-' + currentSort.direction : ''}"
                                onclick="sortTable('models')">Models</th>
                            <th class="sortable ${currentSort.column === 'uptime' ? 'sort-' + currentSort.direction : ''}"
                                onclick="sortTable('uptime')">Uptime</th>
                            <th class="sortable ${currentSort.column === 'latency' ? 'sort-' + currentSort.direction : ''}"
                                onclick="sortTable('latency')">Latency</th>
                            <th class="sortable ${currentSort.column === 'price' ? 'sort-' + currentSort.direction : ''}"
                                onclick="sortTable('price')">Price Range (per 1M)</th>
                            <th>Actions</th>
                        </tr>
                        <tr class="filter-row">
                            <th>
                                <input type="text" class="column-filter" placeholder="Filter..."
                                    value="${columnFilters.provider}"
                                    onchange="applyColumnFilter('provider', this.value)">
                            </th>
                            <th>
                                <input type="text" class="column-filter" placeholder="Filter..."
                                    value="${columnFilters.location}"
                                    onchange="applyColumnFilter('location', this.value)">
                            </th>
                            <th>
                                <div style="display: flex; gap: 4px;">
                                    <input type="number" class="column-filter" placeholder="Min"
                                        value="${columnFilters.models.min}"
                                        style="width: 48%;"
                                        onchange="applyColumnFilter('models', {min: this.value, max: columnFilters.models.max}, 'range')">
                                    <input type="number" class="column-filter" placeholder="Max"
                                        value="${columnFilters.models.max}"
                                        style="width: 48%;"
                                        onchange="applyColumnFilter('models', {min: columnFilters.models.min, max: this.value}, 'range')">
                                </div>
                            </th>
                            <th>
                                <div style="display: flex; gap: 4px;">
                                    <input type="number" class="column-filter" placeholder="Min"
                                        value="${columnFilters.uptime.min}"
                                        style="width: 48%;"
                                        onchange="applyColumnFilter('uptime', {min: this.value, max: columnFilters.uptime.max}, 'range')">
                                    <input type="number" class="column-filter" placeholder="Max"
                                        value="${columnFilters.uptime.max}"
                                        style="width: 48%;"
                                        onchange="applyColumnFilter('uptime', {min: columnFilters.uptime.min, max: this.value}, 'range')">
                                </div>
                            </th>
                            <th>
                                <div style="display: flex; gap: 4px;">
                                    <input type="number" class="column-filter" placeholder="Min"
                                        value="${columnFilters.latency.min}"
                                        style="width: 48%;"
                                        onchange="applyColumnFilter('latency', {min: this.value, max: columnFilters.latency.max}, 'range')">
                                    <input type="number" class="column-filter" placeholder="Max"
                                        value="${columnFilters.latency.max}"
                                        style="width: 48%;"
                                        onchange="applyColumnFilter('latency', {min: columnFilters.latency.min, max: this.value}, 'range')">
                                </div>
                            </th>
                            <th>
                                <div style="display: flex; gap: 4px;">
                                    <input type="number" class="column-filter" placeholder="Min"
                                        value="${columnFilters.price.min}"
                                        style="width: 48%;" step="0.000001"
                                        onchange="applyColumnFilter('price', {min: this.value, max: columnFilters.price.max}, 'range')">
                                    <input type="number" class="column-filter" placeholder="Max"
                                        value="${columnFilters.price.max}"
                                        style="width: 48%;" step="0.000001"
                                        onchange="applyColumnFilter('price', {min: columnFilters.price.min, max: this.value}, 'range')">
                                </div>
                            </th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sortedProviders.map(([name, data]) => `
                            <tr>
                                <td>
                                    <span class="provider-name" onclick="showProviderDetails('${escapeHtml(name)}')">${escapeHtml(name)}</span>
                                </td>
                                <td>${renderLocation(data.provider_info.headquarters)}</td>
                                <td>${data.total_models}</td>
                                <td>${renderMetric(data.performance_stats.avg_uptime, '%', 100)}</td>
                                <td>${renderLatency(data.performance_stats.avg_latency_p50)}</td>
                                <td class="price">${renderPriceRange(data.pricing_range)}</td>
                                <td>
                                    <button class="compare-btn" onclick="showProviderDetails('${escapeHtml(name)}')">
                                        View Details
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('providers-table-container').innerHTML = html;
        }

        function renderGeographyView() {
            const byLocation = {};

            Object.entries(infraData.providers).forEach(([name, data]) => {
                const loc = data.provider_info.headquarters || 'Unknown';
                if (!byLocation[loc]) {
                    byLocation[loc] = [];
                }
                byLocation[loc].push([name, data]);
            });

            const sortedLocations = Object.entries(byLocation)
                .sort((a, b) => b[1].length - a[1].length);

            const html = sortedLocations.map(([location, providers]) => `
                <div style="margin-bottom: 30px;">
                    <h2 style="color: #667eea; margin-bottom: 15px;">
                        ${renderLocation(location === 'Unknown' ? null : location)}
                        (${providers.length} providers, ${providers.reduce((sum, [_, p]) => sum + p.total_models, 0)} models)
                    </h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Provider</th>
                                <th>Models</th>
                                <th>Uptime</th>
                                <th>Latency</th>
                                <th>Price Range</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${providers.map(([name, data]) => `
                                <tr>
                                    <td>
                                        <span class="provider-name" onclick="showProviderDetails('${escapeHtml(name)}')">${escapeHtml(name)}</span>
                                    </td>
                                    <td>${data.total_models}</td>
                                    <td>${renderMetric(data.performance_stats.avg_uptime, '%', 100)}</td>
                                    <td>${renderLatency(data.performance_stats.avg_latency_p50)}</td>
                                    <td class="price">${renderPriceRange(data.pricing_range)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');

            document.getElementById('geography-container').innerHTML = html;
        }

        function renderPerformanceView() {
            const providers = Object.entries(infraData.providers);

            // Best uptime
            const bestUptime = [...providers]
                .filter(([_, p]) => p.performance_stats.avg_uptime !== null)
                .sort((a, b) => b[1].performance_stats.avg_uptime - a[1].performance_stats.avg_uptime)
                .slice(0, 15);

            // Best latency
            const bestLatency = [...providers]
                .filter(([_, p]) => p.performance_stats.avg_latency_p50 !== null)
                .sort((a, b) => a[1].performance_stats.avg_latency_p50 - b[1].performance_stats.avg_latency_p50)
                .slice(0, 15);

            const html = `
                <div style="margin-bottom: 40px;">
                    <h2 style="color: #667eea; margin-bottom: 15px;">⚡ Best Uptime (Top 15)</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Provider</th>
                                <th>Location</th>
                                <th>Models</th>
                                <th>Uptime (24h)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${bestUptime.map(([name, data], idx) => `
                                <tr>
                                    <td><strong>${idx + 1}</strong></td>
                                    <td><span class="provider-name" onclick="showProviderDetails('${escapeHtml(name)}')">${escapeHtml(name)}</span></td>
                                    <td>${renderLocation(data.provider_info.headquarters)}</td>
                                    <td>${data.total_models}</td>
                                    <td>${renderMetric(data.performance_stats.avg_uptime, '%', 100)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div>
                    <h2 style="color: #667eea; margin-bottom: 15px;">🚀 Lowest Latency (Top 15)</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Provider</th>
                                <th>Location</th>
                                <th>Models</th>
                                <th>Latency (p50)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${bestLatency.map(([name, data], idx) => `
                                <tr>
                                    <td><strong>${idx + 1}</strong></td>
                                    <td><span class="provider-name" onclick="showProviderDetails('${escapeHtml(name)}')">${escapeHtml(name)}</span></td>
                                    <td>${renderLocation(data.provider_info.headquarters)}</td>
                                    <td>${data.total_models}</td>
                                    <td>${renderLatency(data.performance_stats.avg_latency_p50)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('performance-container').innerHTML = html;
        }

        function renderPricingView() {
            // Collect all model offerings
            const offerings = [];
            Object.entries(infraData.providers).forEach(([providerName, data]) => {
                data.models.forEach(model => {
                    offerings.push({
                        provider: providerName,
                        modelId: model.model_id,
                        modelName: model.model_name,
                        totalPrice: model.pricing.prompt + model.pricing.completion,
                        promptPrice: model.pricing.prompt,
                        completionPrice: model.pricing.completion
                    });
                });
            });

            // Sort by total price
            offerings.sort((a, b) => a.totalPrice - b.totalPrice);

            // Free models
            const freeModels = offerings.filter(o => o.totalPrice === 0).slice(0, 20);

            // Cheapest paid models
            const cheapestPaid = offerings.filter(o => o.totalPrice > 0).slice(0, 20);

            const html = `
                <div style="margin-bottom: 40px;">
                    <h2 style="color: #667eea; margin-bottom: 15px;">🆓 Free Models (Top 20)</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Model</th>
                                <th>Provider</th>
                                <th>Price</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${freeModels.map(o => `
                                <tr>
                                    <td>${escapeHtml(o.modelId)}</td>
                                    <td><span class="provider-name" onclick="showProviderDetails('${escapeHtml(o.provider)}')">${escapeHtml(o.provider)}</span></td>
                                    <td class="price">FREE</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div>
                    <h2 style="color: #667eea; margin-bottom: 15px;">💰 Cheapest Paid Models (Top 20)</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Model</th>
                                <th>Provider</th>
                                <th>Prompt (per 1M)</th>
                                <th>Completion (per 1M)</th>
                                <th>Total (per 1M)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${cheapestPaid.map(o => `
                                <tr>
                                    <td>${escapeHtml(o.modelId)}</td>
                                    <td><span class="provider-name" onclick="showProviderDetails('${escapeHtml(o.provider)}')">${escapeHtml(o.provider)}</span></td>
                                    <td class="price">$${(o.promptPrice * 1000000).toFixed(4)}</td>
                                    <td class="price">$${(o.completionPrice * 1000000).toFixed(4)}</td>
                                    <td class="price"><strong>$${(o.totalPrice * 1000000).toFixed(4)}</strong></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('pricing-container').innerHTML = html;
        }

        function showProviderDetails(providerName) {
            const data = infraData.providers[providerName];
            const info = data.provider_info;
            const perf = data.performance_stats;
            const pr = data.pricing_range;

            const modalBody = `
                ${info.company_description ? `
                    <div style="margin-bottom: 20px; padding: 15px; background: #0f1419; border-radius: 8px; border: 1px solid #2a2f3e;">
                        <div class="info-label">About</div>
                        <div style="margin-top: 8px; color: #e0e0e0; line-height: 1.6;">${escapeHtml(info.company_description)}</div>
                    </div>
                ` : ''}

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Location</div>
                        <div class="info-value">${renderLocation(info.headquarters)}${info.headquarters_city ? `, ${escapeHtml(info.headquarters_city)}` : ''}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Total Models</div>
                        <div class="info-value">${data.total_models}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Avg Uptime (24h)</div>
                        <div class="info-value">${perf.avg_uptime ? perf.avg_uptime.toFixed(2) + '%' : 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Avg Latency (p50)</div>
                        <div class="info-value">${perf.avg_latency_p50 ? Math.round(perf.avg_latency_p50) + 'ms' : 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Datacenters</div>
                        <div class="info-value">${info.datacenters && info.datacenters.length > 0 ? info.datacenters.join(', ') : 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Tags</div>
                        <div class="info-value" style="font-size: 0.9em;">${data.tags.join(', ')}</div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Prompt Price Range (per 1M tokens)</div>
                        <div class="info-value price">$${(pr.min_prompt * 1000000).toFixed(4)} - $${(pr.max_prompt * 1000000).toFixed(4)}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Completion Price Range (per 1M tokens)</div>
                        <div class="info-value price">$${(pr.min_completion * 1000000).toFixed(4)} - $${(pr.max_completion * 1000000).toFixed(4)}</div>
                    </div>
                </div>

                ${info.homepage || info.contact_email || info.support_url || info.privacy_policy || info.terms_of_service || info.status_page ? `
                    <div style="margin: 20px 0; padding: 15px; background: #0f1419; border-radius: 8px; border: 1px solid #2a2f3e;">
                        <div class="info-label">Links & Contact</div>
                        <div style="display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap;">
                            ${info.homepage ? `<a href="${info.homepage}" target="_blank" style="color: #667eea; font-weight: 600;">🏠 Homepage</a>` : ''}
                            ${info.contact_email ? `<a href="mailto:${info.contact_email}" style="color: #667eea;">📧 ${info.contact_email}</a>` : ''}
                            ${info.support_url ? `<a href="${info.support_url}" target="_blank" style="color: #667eea;">💬 Support</a>` : ''}
                            ${info.status_page ? `<a href="${info.status_page}" target="_blank" style="color: #667eea;">📊 Status</a>` : ''}
                            ${info.privacy_policy ? `<a href="${info.privacy_policy}" target="_blank" style="color: #a0a0a0; font-size: 0.9em;">Privacy</a>` : ''}
                            ${info.terms_of_service ? `<a href="${info.terms_of_service}" target="_blank" style="color: #a0a0a0; font-size: 0.9em;">Terms</a>` : ''}
                        </div>
                    </div>
                ` : ''}

                <div class="model-list">
                    <h3>Models (${data.total_models})</h3>
                    <div style="max-height: 400px; overflow-y: auto;">
                        ${data.models.slice(0, 50).map(model => `
                            <div class="model-item">
                                <div class="model-header">
                                    <div class="model-id">${escapeHtml(model.model_id)}</div>
                                    <div class="model-pricing">
                                        $${(model.pricing.prompt * 1000000).toFixed(4)} / $${(model.pricing.completion * 1000000).toFixed(4)} per 1M
                                    </div>
                                </div>
                                <div class="model-details">
                                    <span>Context: ${model.context_length.toLocaleString()} tokens</span>
                                    ${model.performance.uptime_24h ? `<span>Uptime: ${model.performance.uptime_24h.toFixed(1)}%</span>` : ''}
                                    ${model.performance.latency_30m && model.performance.latency_30m.p50 ?
                                        `<span>Latency: ${Math.round(model.performance.latency_30m.p50)}ms</span>` : ''}
                                </div>
                            </div>
                        `).join('')}
                        ${data.total_models > 50 ? `<div style="text-align: center; padding: 15px; color: #a0a0a0;">... and ${data.total_models - 50} more models</div>` : ''}
                    </div>
                </div>
            `;

            document.getElementById('modal-title').textContent = providerName;
            document.getElementById('modal-body').innerHTML = modalBody;
            document.getElementById('provider-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('provider-modal').classList.remove('active');
        }

        function switchTab(view) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.view === view);
            });
            document.querySelectorAll('.view').forEach(v => {
                v.classList.toggle('active', v.id === view + '-view');
            });
        }

        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'desc';
            }
            renderProvidersTable();
        }

        function getSortValue(provider, column) {
            switch (column) {
                case 'name':
                    return Object.keys(infraData.providers).find(k => infraData.providers[k] === provider);
                case 'location':
                    return provider.provider_info.headquarters || 'ZZZ';
                case 'models':
                    return provider.total_models;
                case 'uptime':
                    return provider.performance_stats.avg_uptime;
                case 'latency':
                    return provider.performance_stats.avg_latency_p50;
                case 'price':
                    return provider.pricing_range.min_prompt + provider.pricing_range.min_completion;
                default:
                    return 0;
            }
        }

        function renderLocation(hq) {
            if (!hq) return '<span class="badge badge-unknown">Unknown</span>';
            const classes = {
                'US': 'badge-us',
                'CN': 'badge-cn',
                'SG': 'badge-sg',
                'FR': 'badge-fr',
                'IL': 'badge-il',
                'NL': 'badge-nl',
                'UK': 'badge-uk'
            };
            return `<span class="badge ${classes[hq] || 'badge-unknown'}">${hq}</span>`;
        }

        function renderMetric(value, suffix, max) {
            if (value === null) return 'N/A';
            const percentage = (value / max) * 100;
            return `
                <div class="metric">
                    <div class="metric-bar">
                        <div class="metric-fill" style="width: ${percentage}%"></div>
                    </div>
                    <span class="metric-value">${value.toFixed(1)}${suffix}</span>
                </div>
            `;
        }

        function renderLatency(value) {
            if (value === null) return 'N/A';
            return `${Math.round(value)}ms`;
        }

        function renderPriceRange(pr) {
            const min = (pr.min_prompt + pr.min_completion) * 1000000;
            const max = (pr.max_prompt + pr.max_completion) * 1000000;
            if (min === 0 && max === 0) return 'FREE';
            // Smart formatting based on magnitude
            if (max < 1) {
                return `$${min.toFixed(4)} - $${max.toFixed(4)}`;
            } else if (max < 100) {
                return `$${min.toFixed(2)} - $${max.toFixed(2)}`;
            } else {
                return `$${min.toFixed(0)} - $${max.toFixed(0)}`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on outside click
        document.getElementById('provider-modal').addEventListener('click', (e) => {
            if (e.target.id === 'provider-modal') {
                closeModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Load data on page load
        loadData();
    </script>
</body>
</html>
