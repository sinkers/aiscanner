<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Rental Pricing</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* ── Nav ── */
        .site-nav {
            display: flex; align-items: center; gap: 12px; padding: 10px 0 18px;
        }
        .site-nav a {
            color: #a0a0a0; text-decoration: none; font-size: 0.9em;
            display: flex; align-items: center; gap: 5px; transition: color 0.2s;
        }
        .site-nav a:hover { color: #06b6d4; }
        .site-nav .breadcrumb-sep { color: #3a3f52; }
        .site-nav .current { color: #e0e0e0; font-weight: 500; }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #0891b2 0%, #059669 100%);
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(8,145,178,0.3);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; color: white; }
        .subtitle { font-size: 1.1em; opacity: 0.9; color: white; }

        /* ── Stats ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a2f3e;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #06b6d4 0%, #4ade80 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { font-size: 0.9em; color: #a0a0a0; margin-top: 5px; }

        /* ── Controls ── */
        .controls {
            background: #1a1f2e;
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2a2f3e;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.82em; color: #a0a0a0; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        input[type="text"] {
            padding: 10px 14px;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            background: #0f1419;
            color: #e0e0e0;
            font-size: 0.95em;
            min-width: 220px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: #06b6d4; }

        /* ── Chips ── */
        .chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid #2a2f3e;
            background: #0f1419;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
        }
        .chip:hover { border-color: #06b6d4; color: #e0e0e0; }
        .chip.active { background: rgba(6,182,212,0.15); border-color: #06b6d4; color: #06b6d4; }

        /* ── Tabs ── */
        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
            border-bottom: 2px solid #2a2f3e;
        }
        .tab {
            padding: 12px 24px; background: transparent; border: none;
            color: #a0a0a0; cursor: pointer; font-size: 1em; font-weight: 500;
            transition: all 0.3s; border-bottom: 3px solid transparent; margin-bottom: -2px;
        }
        .tab:hover { color: #e0e0e0; }
        .tab.active { color: #06b6d4; border-bottom-color: #06b6d4; }

        .view { display: none; }
        .view.active { display: block; }

        /* ── Tables ── */
        table {
            width: 100%; background: #1a1f2e; border-radius: 12px; overflow: hidden;
            border-collapse: collapse; border: 1px solid #2a2f3e;
        }
        th {
            background: #252b3d; padding: 14px 15px; text-align: left;
            font-weight: 600; color: #06b6d4; white-space: nowrap;
        }
        td { padding: 12px 15px; border-top: 1px solid #1e2436; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .price { font-family: 'Courier New', monospace; color: #4ade80; }
        .price-secondary { color: #a0a0a0; font-size: 0.85em; }
        .savings { color: #4ade80; font-weight: 600; }
        .price-high { color: #ef4444; }

        /* ── Provider badges ── */
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.78em; font-weight: 600; white-space: nowrap;
            border: 1px solid;
        }

        /* ── Sortable columns ── */
        th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: 28px;
        }
        th.sortable:hover { color: #67e8f9; }
        th.sort-asc::after  { content: ' ↑'; color: #4ade80; }
        th.sort-desc::after { content: ' ↓'; color: #4ade80; }

        /* ── Best deals ── */
        .deals-section {
            background: #1a1f2e; border-radius: 12px; border: 1px solid #2a2f3e;
            overflow: hidden; margin-bottom: 20px;
        }
        .deals-section-header {
            padding: 16px 20px; background: #252b3d;
            font-size: 1em; font-weight: 600; color: #06b6d4;
        }

        /* ── History charts ── */
        .gpu-row { cursor: pointer; }
        .gpu-history-row td { padding: 0 !important; border-top: none !important; }
        .gpu-history-content {
            display: none;
            background: #0f1419;
            padding: 16px 20px;
            border-top: 1px solid #2a2f3e;
        }
        .gpu-history-content.open { display: block; }
        .gpu-chevron {
            display: inline-block;
            transition: transform 0.2s;
            color: #06b6d4;
            margin-right: 6px;
        }

        .timestamp-bar {
            color: #a0a0a0; font-size: 0.82em; text-align: right;
            margin-bottom: 16px;
        }

        .no-data {
            text-align: center; color: #a0a0a0; padding: 60px 20px;
        }

        @media (max-width: 768px) {
            table { font-size: 0.85em; }
        }
    </style>
</head>
<body>
<div class="container">
    <nav class="site-nav">
        <a href="index.html">← Home</a>
        <span class="breadcrumb-sep">/</span>
        <span class="current">GPU Rental Pricing</span>
    </nav>

    <header>
        <h1>🖥️ GPU Rental Pricing</h1>
        <p class="subtitle">Spot, on-demand, and reserved rates across all GPU rental providers</p>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="stat-total">–</div>
            <div class="stat-label">GPU Models</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-providers">–</div>
            <div class="stat-label">Providers</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-listings">–</div>
            <div class="stat-label">Total Listings</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-cheapest">–</div>
            <div class="stat-label">Cheapest /hr</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Search</label>
            <input type="text" id="search" placeholder="e.g. RTX 4090, A100...">
        </div>
        <div class="control-group">
            <label>VRAM</label>
            <div class="chips" id="vramChips">
                <div class="chip active" data-vram="all">All</div>
                <div class="chip" data-vram="8-16">8–16 GB</div>
                <div class="chip" data-vram="16-32">16–32 GB</div>
                <div class="chip" data-vram="32-64">32–64 GB</div>
                <div class="chip" data-vram="64+">64+ GB</div>
            </div>
        </div>
        <div class="control-group">
            <label>Provider</label>
            <div class="chips" id="providerChips">
                <div class="chip active" data-provider="all">All</div>
            </div>
        </div>
    </div>

    <div class="timestamp-bar" id="timestamp"></div>

    <div class="tabs">
        <button class="tab active" data-view="combined">All GPUs</button>
        <button class="tab" data-view="deals">Best Deals</button>
    </div>

    <div id="combined-view" class="view active">
        <div id="combined-container">
            <div class="no-data">Loading...</div>
        </div>
    </div>

    <div id="deals-view" class="view">
        <div id="deals-container"></div>
    </div>
</div>

<script>
    const CHART_COLORS = ['#06b6d4','#4ade80','#f59e0b','#ef4444','#a855f7','#667eea','#f97316','#84cc16'];

    // Stable color assignment per provider name
    const PROVIDER_PALETTE = [
        { bg: 'rgba(102,126,234,0.15)', color: '#667eea', border: 'rgba(102,126,234,0.3)' },
        { bg: 'rgba(168,85,247,0.15)',  color: '#a855f7', border: 'rgba(168,85,247,0.3)' },
        { bg: 'rgba(6,182,212,0.15)',   color: '#06b6d4', border: 'rgba(6,182,212,0.3)' },
        { bg: 'rgba(74,222,128,0.15)',  color: '#4ade80', border: 'rgba(74,222,128,0.3)' },
        { bg: 'rgba(245,158,11,0.15)',  color: '#f59e0b', border: 'rgba(245,158,11,0.3)' },
        { bg: 'rgba(239,68,68,0.15)',   color: '#ef4444', border: 'rgba(239,68,68,0.3)' },
        { bg: 'rgba(249,115,22,0.15)',  color: '#f97316', border: 'rgba(249,115,22,0.3)' },
        { bg: 'rgba(132,204,22,0.15)',  color: '#84cc16', border: 'rgba(132,204,22,0.3)' },
    ];
    const _providerColorCache = {};
    function providerColor(name) {
        if (!_providerColorCache[name]) {
            const idx = Object.keys(_providerColorCache).length % PROVIDER_PALETTE.length;
            _providerColorCache[name] = PROVIDER_PALETTE[idx];
        }
        return _providerColorCache[name];
    }
    function badgeHtml(providerName) {
        const c = providerColor(providerName);
        return `<span class="badge" style="background:${c.bg};color:${c.color};border-color:${c.border}">${escapeHtml(providerName)}</span>`;
    }

    let gpuData = null;
    let filteredData = [];
    let currentVram = 'all';
    let currentSearch = '';
    let currentProvider = 'all';
    let currentView = 'combined';
    let sortColumn = 'bestPrice';
    let sortDirection = 'asc';
    let expandedHistories = new Map();  // safeId -> Chart instance

    async function loadData() {
        try {
            const r = await fetch('rollups/gpu/latest.json');
            if (!r.ok) throw new Error('not found');
            gpuData = await r.json();
            updateStats();
            updateTimestamp();
            applyFilters();
        } catch (e) {
            document.getElementById('combined-container').innerHTML =
                '<div class="no-data">GPU pricing data not available yet — it will appear after the first daily Lambda run with GPU API keys configured.</div>';
        }
    }

    // Returns all provider keys in gpuData (any key whose value has a gpus array)
    function getProviderKeys() {
        if (!gpuData) return [];
        return Object.keys(gpuData).filter(k => Array.isArray(gpuData[k]?.gpus));
    }

    function updateStats() {
        if (!gpuData) return;
        const providerKeys = getProviderKeys();
        const allGpus = buildCombined();
        const uniqueModels = new Set(allGpus.map(g => normalizeGpuName(g.name))).size;
        const prices = allGpus.map(g => g.bestPrice).filter(p => p && p > 0);
        const cheapest = prices.length ? `$${Math.min(...prices).toFixed(3)}` : '–';

        document.getElementById('stat-total').textContent = uniqueModels;
        document.getElementById('stat-providers').textContent = providerKeys.length;
        document.getElementById('stat-listings').textContent = allGpus.length;
        document.getElementById('stat-cheapest').textContent = cheapest;

        // Populate provider filter chips dynamically
        const chipsEl = document.getElementById('providerChips');
        const existing = new Set([...chipsEl.querySelectorAll('.chip')].map(c => c.dataset.provider));
        providerKeys.forEach(key => {
            if (existing.has(key)) return;
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.dataset.provider = key;
            chip.textContent = gpuData[key].name || key;
            chip.addEventListener('click', () => {
                chipsEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentProvider = key;
                applyFilters();
            });
            chipsEl.appendChild(chip);
        });
    }

    function updateTimestamp() {
        if (!gpuData?.generated_at) return;
        const d = new Date(gpuData.generated_at);
        document.getElementById('timestamp').textContent =
            `Last updated: ${d.toLocaleString()}`;
    }

    function normalizeGpuName(n) {
        return n.toLowerCase().replace(/[\s\-_]+/g,'').replace(/nvidia|amd/g,'');
    }

    // Generic best-price extractor — tries all known pricing field names
    function getBestPrice(pricing) {
        return pricing.best_price
            || pricing.community_spot
            || pricing.community_on_demand
            || pricing.min_price
            || pricing.rentable_min
            || pricing.min
            || pricing.secure_on_demand
            || null;
    }

    function buildCombined() {
        const out = [];
        getProviderKeys().forEach(key => {
            const provData = gpuData[key];
            const providerLabel = provData.name || key;
            (provData.gpus || []).forEach(g => {
                const pricing = g.pricing || {};
                out.push({
                    provider: key,
                    providerLabel,
                    name: g.name,
                    vram: g.vram_gb || g.vram || 0,
                    pricing,
                    bestPrice: getBestPrice(pricing),
                    availability: g.available !== undefined
                        ? (g.available ? 'Available' : 'Not available')
                        : (g.rentable_offers != null ? `${g.rentable_offers}/${g.total_offers || '?'} rentable` : '–'),
                    // Server specs (populated when available)
                    cpu: g.cpu || null,
                    ram_gb: g.ram_gb || null,
                    storage_gb: g.storage_gb || null,
                    raw: g,
                });
            });
        });
        return out;
    }

    function applyFilters() {
        const all = buildCombined();
        filteredData = all.filter(gpu => {
            if (currentSearch && !gpu.name.toLowerCase().includes(currentSearch)) return false;
            if (currentProvider !== 'all' && gpu.provider !== currentProvider) return false;
            if (currentVram !== 'all') {
                const v = gpu.vram || 0;
                if (currentVram === '8-16'  && (v < 8  || v >= 16)) return false;
                if (currentVram === '16-32' && (v < 16 || v >= 32)) return false;
                if (currentVram === '32-64' && (v < 32 || v >= 64)) return false;
                if (currentVram === '64+'   && v < 64) return false;
            }
            return true;
        });
        renderCurrentView();
    }

    function renderCurrentView() {
        if (currentView === 'combined') renderCombined();
        if (currentView === 'deals')    renderDeals();
    }

    function formatPrice(p) {
        if (!p && p !== 0) return '–';
        if (p === 0) return '<span style="color:#4ade80">FREE</span>';
        return `<span class="price">$${p.toFixed(3)}/hr</span>`;
    }

    function fmtPriceRaw(p) {
        if (!p && p !== 0) return '–';
        return p === 0 ? 'FREE' : `$${p.toFixed(3)}/hr`;
    }

    function escapeHtml(t) {
        const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
    }

    // ── Combined view ──────────────────────────────────────────────────────

    function sortData(data) {
        const dir = sortDirection === 'asc' ? 1 : -1;
        return [...data].sort((a, b) => {
            switch (sortColumn) {
                case 'name':      return dir * a.name.localeCompare(b.name);
                case 'provider':  return dir * a.provider.localeCompare(b.provider);
                case 'vram':      return dir * ((a.vram || 0) - (b.vram || 0));
                case 'bestPrice': return dir * ((a.bestPrice || 9999) - (b.bestPrice || 9999));
                default:          return 0;
            }
        });
    }

    function thHtml(label, col) {
        const cls = sortColumn === col
            ? `sortable sort-${sortDirection}`
            : 'sortable';
        return `<th class="${cls}" onclick="setSort('${col}')">${label}</th>`;
    }

    function setSort(col) {
        if (sortColumn === col) {
            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
            sortColumn = col;
            sortDirection = col === 'bestPrice' ? 'asc' : 'asc';
        }
        renderCombined();
    }

    function renderCombined() {
        const sorted = sortData(filteredData);
        if (!sorted.length) {
            document.getElementById('combined-container').innerHTML =
                '<div class="no-data">No GPUs match the current filters.</div>';
            return;
        }

        const rows = sorted.map(gpu => {
            const safeId = (gpu.provider + '_' + gpu.name).replace(/[^a-zA-Z0-9]/g, '_');
            const allPricesHtml = buildAllPricesHtml(gpu);
            const serverSpecs = [
                gpu.cpu  ? `CPU: ${gpu.cpu}`        : null,
                gpu.ram_gb     ? `RAM: ${gpu.ram_gb}GB`   : null,
                gpu.storage_gb ? `Disk: ${gpu.storage_gb}GB` : null,
            ].filter(Boolean).join(' · ');
            return `
                <tr class="gpu-row" onclick="toggleHistory('${safeId}','${escapeHtml(gpu.name)}','${gpu.provider}')" title="Click to show price history">
                    <td>
                        <span class="gpu-chevron" id="chev-${safeId}">&#9654;</span>
                        <strong>${escapeHtml(gpu.name)}</strong>
                        ${serverSpecs ? `<div style="font-size:0.78em;color:#a0a0a0;margin-top:2px">${escapeHtml(serverSpecs)}</div>` : ''}
                    </td>
                    <td>${badgeHtml(gpu.providerLabel)}</td>
                    <td>${gpu.vram ? gpu.vram + ' GB' : '–'}</td>
                    <td>${formatPrice(gpu.bestPrice)}</td>
                    <td><span class="price-secondary">${allPricesHtml}</span></td>
                    <td>${gpu.availability}</td>
                </tr>
                <tr class="gpu-history-row">
                    <td colspan="6">
                        <div class="gpu-history-content" id="hist-${safeId}">
                            <div style="text-align:center;color:#a0a0a0;padding:20px;font-size:0.85em;">Loading history...</div>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');

        document.getElementById('combined-container').innerHTML = `
            <table>
                <thead>
                    <tr>
                        ${thHtml('GPU Model', 'name')}
                        ${thHtml('Provider', 'provider')}
                        ${thHtml('VRAM', 'vram')}
                        ${thHtml('Best Price', 'bestPrice')}
                        <th>All Prices</th>
                        <th>Availability</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;
    }

    const PRICE_FIELD_LABELS = {
        community_spot:      'Spot',
        community_on_demand: 'Community OD',
        secure_on_demand:    'Secure OD',
        rentable_min:        'Min',
        min:                 'Min',
        avg:                 'Avg',
        best_price:          'Best',
        min_price:           'Min',
        reserved:            'Reserved',
    };

    function buildAllPricesHtml(gpu) {
        const parts = [];
        const p = gpu.pricing;
        const seen = new Set();
        for (const [field, label] of Object.entries(PRICE_FIELD_LABELS)) {
            if (p[field] != null && !seen.has(label)) {
                seen.add(label);
                parts.push(`${label}: $${(+p[field]).toFixed(3)}`);
            }
        }
        return parts.join(' · ') || '–';
    }

    // ── Best deals view ────────────────────────────────────────────────────

    function renderDeals() {
        const allData = buildCombined();

        // Group by normalized GPU name → find price spread across providers
        const byModel = {};
        allData.forEach(g => {
            const key = normalizeGpuName(g.name);
            if (!byModel[key]) byModel[key] = { name: g.name, vram: g.vram, entries: [] };
            if (g.bestPrice) byModel[key].entries.push(g);
        });

        const spreads = Object.values(byModel)
            .filter(m => m.entries.length >= 2)
            .map(m => {
                const sorted = [...m.entries].sort((a, b) => a.bestPrice - b.bestPrice);
                const cheapest = sorted[0];
                const priciest = sorted[sorted.length - 1];
                return {
                    name: m.name, vram: m.vram,
                    cheapest, priciest,
                    spread: Math.round((priciest.bestPrice - cheapest.bestPrice) / cheapest.bestPrice * 100),
                    providerCount: m.entries.length,
                };
            })
            .filter(s => s.spread > 0)
            .sort((a, b) => b.spread - a.spread);

        const cheapest12 = [...allData].sort((a, b) => (a.bestPrice || 999) - (b.bestPrice || 999)).slice(0, 12);

        const spreadRows = spreads.slice(0, 20).map(s => `
            <tr>
                <td><strong>${escapeHtml(s.name)}</strong></td>
                <td>${s.vram || '–'} GB</td>
                <td>${s.providerCount}</td>
                <td>${formatPrice(s.cheapest.bestPrice)} <span style="color:#a0a0a0;font-size:0.82em">(${badgeHtml(s.cheapest.providerLabel)})</span></td>
                <td class="price price-high">${fmtPriceRaw(s.priciest.bestPrice)} <span style="color:#a0a0a0;font-size:0.82em">(${badgeHtml(s.priciest.providerLabel)})</span></td>
                <td><span class="savings">${s.spread}% spread</span></td>
            </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#a0a0a0;padding:20px">No matching GPU types across providers yet.</td></tr>';

        const cheapestRows = cheapest12.map(g => `
            <tr>
                <td><strong>${escapeHtml(g.name)}</strong></td>
                <td>${badgeHtml(g.providerLabel)}</td>
                <td>${g.vram || '–'} GB</td>
                <td>${formatPrice(g.bestPrice)}</td>
                <td>${g.vram && g.bestPrice ? `$${(g.bestPrice / g.vram).toFixed(4)}/GB` : '–'}</td>
            </tr>`).join('');

        document.getElementById('deals-container').innerHTML = `
            <div class="deals-section">
                <div class="deals-section-header">🎯 Best Price Spread — Same GPU, Different Providers</div>
                <table>
                    <thead><tr>
                        <th>GPU Model</th><th>VRAM</th><th>Providers</th>
                        <th>Cheapest</th><th>Priciest</th><th>Spread</th>
                    </tr></thead>
                    <tbody>${spreadRows}</tbody>
                </table>
            </div>
            <div class="deals-section">
                <div class="deals-section-header">💰 Cheapest GPUs (All Providers)</div>
                <table>
                    <thead><tr>
                        <th>GPU Model</th><th>Provider</th><th>VRAM</th>
                        <th>Price/Hour</th><th>Price/GB VRAM</th>
                    </tr></thead>
                    <tbody>${cheapestRows}</tbody>
                </table>
            </div>`;
    }

    // ── Price history ──────────────────────────────────────────────────────

    async function toggleHistory(safeId, gpuName, provider) {
        const el = document.getElementById(`hist-${safeId}`);
        const chev = document.getElementById(`chev-${safeId}`);
        if (!el) return;
        const isOpen = el.classList.contains('open');

        if (isOpen) {
            el.classList.remove('open');
            chev.style.transform = '';
            if (expandedHistories.has(safeId)) {
                expandedHistories.get(safeId).destroy();
                expandedHistories.delete(safeId);
            }
            return;
        }

        el.classList.add('open');
        chev.style.transform = 'rotate(90deg)';

        if (expandedHistories.has(safeId)) return; // already loaded

        const safeName = gpuName.replace(/[^a-zA-Z0-9]/g, '_');
        try {
            const r = await fetch(`rollups/gpu/history/${safeName}.json`);
            if (!r.ok) throw new Error('not found');
            const data = await r.json();

            if (!data.history || data.history.length < 2) {
                el.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:20px;font-size:0.85em;">Only one data point — history builds up daily.</div>';
                return;
            }

            const labels = data.history.map(h => h.date);

            // Determine which price series exist — dynamically from history keys
            const SERIES_LABELS = {
                community_spot:      'Spot',
                community_on_demand: 'Community OD',
                secure_on_demand:    'Secure OD',
                vast_min:            'Vast Min',
                vast_avg:            'Vast Avg',
                min_price:           'Min',
                avg_price:           'Avg',
                reserved:            'Reserved',
            };
            const allKeys = data.history.length > 0
                ? Object.keys(data.history[0]).filter(k => k !== 'date' && typeof data.history[0][k] === 'number')
                : [];
            const datasets = [];
            allKeys.forEach((key, idx) => {
                const vals = data.history.map(h => h[key] != null ? +h[key].toFixed(4) : null);
                if (vals.some(v => v != null)) {
                    datasets.push({
                        label: SERIES_LABELS[key] || key,
                        data: vals,
                        borderColor: CHART_COLORS[idx % CHART_COLORS.length],
                        backgroundColor: CHART_COLORS[idx % CHART_COLORS.length] + '22',
                        tension: 0.3, fill: false, pointRadius: 3, spanGaps: true,
                    });
                }
            });

            if (!datasets.length) {
                el.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:20px;font-size:0.85em;">No price data in history.</div>';
                return;
            }

            el.innerHTML = '<div style="height:200px"><canvas></canvas></div>';
            const ctx = el.querySelector('canvas').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#e0e0e0', boxWidth: 10, font: { size: 11 } } },
                        tooltip: { callbacks: { label: c => `${c.dataset.label}: $${c.parsed.y?.toFixed(4) ?? 'N/A'}/hr` } },
                    },
                    scales: {
                        x: { ticks: { color: '#a0a0a0', maxTicksLimit: 10 }, grid: { color: '#2a2f3e' } },
                        y: { ticks: { color: '#a0a0a0', callback: v => `$${v.toFixed(3)}` }, grid: { color: '#2a2f3e' } },
                    },
                },
            });
            expandedHistories.set(safeId, chart);
        } catch (e) {
            el.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:20px;font-size:0.85em;">No history yet — check back after the first daily run.</div>';
        }
    }

    // ── Event listeners ────────────────────────────────────────────────────

    document.getElementById('search').addEventListener('input', e => {
        currentSearch = e.target.value.toLowerCase();
        applyFilters();
    });

    document.querySelectorAll('#vramChips .chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('#vramChips .chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentVram = chip.dataset.vram;
            applyFilters();
        });
    });

    // Provider chips — "All" chip is static; others added dynamically in updateStats()
    document.getElementById('providerChips').addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.querySelectorAll('#providerChips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentProvider = chip.dataset.provider;
        applyFilters();
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentView = tab.dataset.view;
            document.querySelectorAll('.view').forEach(v => {
                v.classList.toggle('active', v.id === currentView + '-view');
            });
            renderCurrentView();
        });
    });

    loadData();
</script>
</body>
