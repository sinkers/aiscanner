<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Rental Pricing — RunPod vs Vast.ai</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* ── Nav ── */
        .site-nav {
            display: flex; align-items: center; gap: 12px; padding: 10px 0 18px;
        }
        .site-nav a {
            color: #a0a0a0; text-decoration: none; font-size: 0.9em;
            display: flex; align-items: center; gap: 5px; transition: color 0.2s;
        }
        .site-nav a:hover { color: #06b6d4; }
        .site-nav .breadcrumb-sep { color: #3a3f52; }
        .site-nav .current { color: #e0e0e0; font-weight: 500; }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #0891b2 0%, #059669 100%);
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(8,145,178,0.3);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; color: white; }
        .subtitle { font-size: 1.1em; opacity: 0.9; color: white; }

        /* ── Stats ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a2f3e;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #06b6d4 0%, #4ade80 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { font-size: 0.9em; color: #a0a0a0; margin-top: 5px; }

        /* ── Controls ── */
        .controls {
            background: #1a1f2e;
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2a2f3e;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.82em; color: #a0a0a0; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        input[type="text"] {
            padding: 10px 14px;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            background: #0f1419;
            color: #e0e0e0;
            font-size: 0.95em;
            min-width: 220px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: #06b6d4; }

        /* ── Chips ── */
        .chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid #2a2f3e;
            background: #0f1419;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
        }
        .chip:hover { border-color: #06b6d4; color: #e0e0e0; }
        .chip.active { background: rgba(6,182,212,0.15); border-color: #06b6d4; color: #06b6d4; }

        /* ── Tabs ── */
        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
            border-bottom: 2px solid #2a2f3e;
        }
        .tab {
            padding: 12px 24px; background: transparent; border: none;
            color: #a0a0a0; cursor: pointer; font-size: 1em; font-weight: 500;
            transition: all 0.3s; border-bottom: 3px solid transparent; margin-bottom: -2px;
        }
        .tab:hover { color: #e0e0e0; }
        .tab.active { color: #06b6d4; border-bottom-color: #06b6d4; }

        .view { display: none; }
        .view.active { display: block; }

        /* ── Tables ── */
        table {
            width: 100%; background: #1a1f2e; border-radius: 12px; overflow: hidden;
            border-collapse: collapse; border: 1px solid #2a2f3e;
        }
        th {
            background: #252b3d; padding: 14px 15px; text-align: left;
            font-weight: 600; color: #06b6d4; white-space: nowrap;
        }
        td { padding: 12px 15px; border-top: 1px solid #1e2436; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .price { font-family: 'Courier New', monospace; color: #4ade80; }
        .price-secondary { color: #a0a0a0; font-size: 0.85em; }
        .savings { color: #4ade80; font-weight: 600; }
        .price-high { color: #ef4444; }

        /* ── Provider badges ── */
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.78em; font-weight: 600; white-space: nowrap;
        }
        .badge-runpod { background: rgba(102,126,234,0.15); color: #667eea; border: 1px solid rgba(102,126,234,0.3); }
        .badge-vast { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }

        /* ── Side-by-side ── */
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .comparison-panel {
            background: #1a1f2e; border-radius: 12px; border: 1px solid #2a2f3e; overflow: hidden;
        }
        .comparison-panel h3 {
            padding: 16px 20px; background: #252b3d;
            font-size: 1em; font-weight: 600;
        }

        /* ── Best deals ── */
        .deals-section {
            background: #1a1f2e; border-radius: 12px; border: 1px solid #2a2f3e;
            overflow: hidden; margin-bottom: 20px;
        }
        .deals-section-header {
            padding: 16px 20px; background: #252b3d;
            font-size: 1em; font-weight: 600; color: #06b6d4;
        }

        /* ── History charts ── */
        .gpu-row { cursor: pointer; }
        .gpu-history-row td { padding: 0 !important; border-top: none !important; }
        .gpu-history-content {
            display: none;
            background: #0f1419;
            padding: 16px 20px;
            border-top: 1px solid #2a2f3e;
        }
        .gpu-history-content.open { display: block; }
        .gpu-chevron {
            display: inline-block;
            transition: transform 0.2s;
            color: #06b6d4;
            margin-right: 6px;
        }

        .timestamp-bar {
            color: #a0a0a0; font-size: 0.82em; text-align: right;
            margin-bottom: 16px;
        }

        .no-data {
            text-align: center; color: #a0a0a0; padding: 60px 20px;
        }

        @media (max-width: 768px) {
            .comparison-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <nav class="site-nav">
        <a href="index.html">← Home</a>
        <span class="breadcrumb-sep">/</span>
        <span class="current">GPU Rental Pricing</span>
    </nav>

    <header>
        <h1>🖥️ GPU Rental Pricing</h1>
        <p class="subtitle">RunPod vs Vast.ai — spot, on-demand, and market rates across all GPU types</p>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="stat-total">–</div>
            <div class="stat-label">Total GPU Types</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-runpod">–</div>
            <div class="stat-label">RunPod GPU Types</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-vast">–</div>
            <div class="stat-label">Vast.ai GPU Types</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-savings">–</div>
            <div class="stat-label">Avg Savings (Vast vs RunPod)</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Search</label>
            <input type="text" id="search" placeholder="e.g. RTX 4090, A100...">
        </div>
        <div class="control-group">
            <label>VRAM</label>
            <div class="chips" id="vramChips">
                <div class="chip active" data-vram="all">All</div>
                <div class="chip" data-vram="8-16">8–16 GB</div>
                <div class="chip" data-vram="16-32">16–32 GB</div>
                <div class="chip" data-vram="32-64">32–64 GB</div>
                <div class="chip" data-vram="64+">64+ GB</div>
            </div>
        </div>
    </div>

    <div class="timestamp-bar" id="timestamp"></div>

    <div class="tabs">
        <button class="tab active" data-view="combined">Combined</button>
        <button class="tab" data-view="sidebyside">Side-by-Side</button>
        <button class="tab" data-view="deals">Best Deals</button>
    </div>

    <div id="combined-view" class="view active">
        <div id="combined-container">
            <div class="no-data">Loading...</div>
        </div>
    </div>

    <div id="sidebyside-view" class="view">
        <div id="sidebyside-container"></div>
    </div>

    <div id="deals-view" class="view">
        <div id="deals-container"></div>
    </div>
</div>

<script>
    const CHART_COLORS = ['#06b6d4','#4ade80','#f59e0b','#ef4444','#a855f7','#667eea','#f97316','#84cc16'];

    let gpuData = null;
    let filteredData = [];
    let currentVram = 'all';
    let currentSearch = '';
    let currentView = 'combined';
    let expandedHistories = new Map();  // safeId -> Chart instance

    async function loadData() {
        try {
            const r = await fetch('rollups/gpu/latest.json');
            if (!r.ok) throw new Error('not found');
            gpuData = await r.json();
            updateStats();
            updateTimestamp();
            applyFilters();
        } catch (e) {
            document.getElementById('combined-container').innerHTML =
                '<div class="no-data">GPU pricing data not available yet — it will appear after the first daily Lambda run with GPU API keys configured.</div>';
        }
    }

    function updateStats() {
        if (!gpuData) return;
        const rp = gpuData.runpod?.total_gpus || 0;
        const va = gpuData.vast?.total_gpu_types || 0;
        document.getElementById('stat-total').textContent = rp + va;
        document.getElementById('stat-runpod').textContent = rp;
        document.getElementById('stat-vast').textContent = va;
        document.getElementById('stat-savings').textContent = calcAvgSavings();
    }

    function calcAvgSavings() {
        if (!gpuData) return '–';
        const rpGpus = gpuData.runpod?.gpus || [];
        const vaGpus = gpuData.vast?.gpus || [];
        let total = 0, count = 0;
        rpGpus.forEach(rp => {
            const match = vaGpus.find(v =>
                normalizeGpuName(v.name) === normalizeGpuName(rp.name)
            );
            if (!match) return;
            const rpPrice = rp.pricing.community_spot || rp.pricing.community_on_demand || rp.pricing.secure_on_demand;
            const vaPrice = match.pricing.rentable_min || match.pricing.min;
            if (rpPrice && vaPrice && rpPrice > 0) {
                const savings = (rpPrice - vaPrice) / rpPrice * 100;
                if (savings > 0) { total += savings; count++; }
            }
        });
        return count > 0 ? `${(total / count).toFixed(0)}%` : '–';
    }

    function updateTimestamp() {
        if (!gpuData?.generated_at) return;
        const d = new Date(gpuData.generated_at);
        document.getElementById('timestamp').textContent =
            `Last updated: ${d.toLocaleString()}`;
    }

    function normalizeGpuName(n) {
        return n.toLowerCase().replace(/[\s\-_]+/g,'').replace(/nvidia|amd/g,'');
    }

    function getBestPrice(gpu) {
        if (gpu.provider === 'runpod') {
            return gpu.pricing.community_spot || gpu.pricing.community_on_demand || gpu.pricing.secure_on_demand;
        }
        return gpu.pricing.rentable_min || gpu.pricing.min;
    }

    function buildCombined() {
        const out = [];
        (gpuData?.runpod?.gpus || []).forEach(g => out.push({
            provider: 'runpod', name: g.name, vram: g.vram_gb || 0,
            pricing: g.pricing, bestPrice: getBestPrice({provider:'runpod', pricing:g.pricing}),
            secureAvail: g.secure_cloud_available, communityAvail: g.community_cloud_available,
            raw: g,
        }));
        (gpuData?.vast?.gpus || []).forEach(g => out.push({
            provider: 'vast', name: g.name, vram: g.vram_gb || 0,
            pricing: g.pricing, bestPrice: g.pricing.rentable_min || g.pricing.min,
            totalOffers: g.total_offers, rentableOffers: g.rentable_offers,
            raw: g,
        }));
        return out;
    }

    function applyFilters() {
        const all = buildCombined();
        filteredData = all.filter(gpu => {
            if (currentSearch && !gpu.name.toLowerCase().includes(currentSearch)) return false;
            if (currentVram !== 'all') {
                const v = gpu.vram || 0;
                if (currentVram === '8-16'  && (v < 8  || v >= 16)) return false;
                if (currentVram === '16-32' && (v < 16 || v >= 32)) return false;
                if (currentVram === '32-64' && (v < 32 || v >= 64)) return false;
                if (currentVram === '64+'   && v < 64) return false;
            }
            return true;
        });
        renderCurrentView();
    }

    function renderCurrentView() {
        if (currentView === 'combined')  renderCombined();
        if (currentView === 'sidebyside') renderSideBySide();
        if (currentView === 'deals')     renderDeals();
    }

    function formatPrice(p) {
        if (!p && p !== 0) return '–';
        if (p === 0) return '<span style="color:#4ade80">FREE</span>';
        return `<span class="price">$${p.toFixed(3)}/hr</span>`;
    }

    function fmtPriceRaw(p) {
        if (!p && p !== 0) return '–';
        return p === 0 ? 'FREE' : `$${p.toFixed(3)}/hr`;
    }

    function escapeHtml(t) {
        const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
    }

    // ── Combined view ──────────────────────────────────────────────────────

    function renderCombined() {
        const sorted = [...filteredData].sort((a, b) => (a.bestPrice || 999) - (b.bestPrice || 999));
        if (!sorted.length) {
            document.getElementById('combined-container').innerHTML =
                '<div class="no-data">No GPUs match the current filters.</div>';
            return;
        }

        const rows = sorted.map(gpu => {
            const safeId = (gpu.provider + '_' + gpu.name).replace(/[^a-zA-Z0-9]/g, '_');
            const allPricesHtml = buildAllPricesHtml(gpu);
            const avail = gpu.provider === 'vast'
                ? `${gpu.rentableOffers}/${gpu.totalOffers} rentable`
                : (gpu.communityAvail ? '✅ Available' : '❌ Not available');
            return `
                <tr class="gpu-row" onclick="toggleHistory('${safeId}','${escapeHtml(gpu.name)}','${gpu.provider}')" title="Click to show price history">
                    <td>
                        <span class="gpu-chevron" id="chev-${safeId}">&#9654;</span>
                        <strong>${escapeHtml(gpu.name)}</strong>
                    </td>
                    <td><span class="badge badge-${gpu.provider}">${gpu.provider}</span></td>
                    <td>${gpu.vram ? gpu.vram + ' GB' : '–'}</td>
                    <td>${formatPrice(gpu.bestPrice)}</td>
                    <td><span class="price-secondary">${allPricesHtml}</span></td>
                    <td>${avail}</td>
                </tr>
                <tr class="gpu-history-row">
                    <td colspan="6">
                        <div class="gpu-history-content" id="hist-${safeId}">
                            <div style="text-align:center;color:#a0a0a0;padding:20px;font-size:0.85em;">Loading history...</div>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');

        document.getElementById('combined-container').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>GPU Model</th>
                        <th>Provider</th>
                        <th>VRAM</th>
                        <th>Best Price</th>
                        <th>All Prices</th>
                        <th>Availability</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;
    }

    function buildAllPricesHtml(gpu) {
        const parts = [];
        if (gpu.provider === 'runpod') {
            const p = gpu.pricing;
            if (p.community_spot)      parts.push(`Spot: $${p.community_spot.toFixed(3)}`);
            if (p.community_on_demand) parts.push(`Comm: $${p.community_on_demand.toFixed(3)}`);
            if (p.secure_on_demand)    parts.push(`Sec: $${p.secure_on_demand.toFixed(3)}`);
        } else {
            const p = gpu.pricing;
            if (p.rentable_min != null) parts.push(`Min: $${p.rentable_min.toFixed(3)}`);
            if (p.avg != null)          parts.push(`Avg: $${p.avg.toFixed(3)}`);
        }
        return parts.join(' · ') || '–';
    }

    // ── Side-by-side view ──────────────────────────────────────────────────

    function renderSideBySide() {
        const rp = filteredData.filter(g => g.provider === 'runpod')
            .sort((a, b) => (a.bestPrice || 999) - (b.bestPrice || 999));
        const va = filteredData.filter(g => g.provider === 'vast')
            .sort((a, b) => (a.bestPrice || 999) - (b.bestPrice || 999));

        function providerTable(gpus, prov) {
            if (!gpus.length) return '<div class="no-data" style="padding:30px">No GPUs match filters</div>';
            const rows = gpus.slice(0, 20).map(g => `
                <tr>
                    <td><strong>${escapeHtml(g.name)}</strong></td>
                    <td>${g.vram ? g.vram + ' GB' : '–'}</td>
                    <td>${formatPrice(g.bestPrice)}</td>
                </tr>`).join('');
            const more = gpus.length > 20 ? `<tr><td colspan="3" style="text-align:center;color:#a0a0a0;padding:12px">+${gpus.length - 20} more</td></tr>` : '';
            return `<table><thead><tr><th>GPU</th><th>VRAM</th><th>Best Price</th></tr></thead><tbody>${rows}${more}</tbody></table>`;
        }

        document.getElementById('sidebyside-container').innerHTML = `
            <div class="comparison-grid">
                <div class="comparison-panel">
                    <h3>🟦 RunPod (${rp.length} GPUs)</h3>
                    ${providerTable(rp, 'runpod')}
                </div>
                <div class="comparison-panel">
                    <h3>🟪 Vast.ai (${va.length} GPUs)</h3>
                    ${providerTable(va, 'vast')}
                </div>
            </div>`;
    }

    // ── Best deals view ────────────────────────────────────────────────────

    function renderDeals() {
        const rpGpus = gpuData?.runpod?.gpus || [];
        const vaGpus = gpuData?.vast?.gpus || [];

        const comparisons = [];
        rpGpus.forEach(rp => {
            const match = vaGpus.find(v => normalizeGpuName(v.name) === normalizeGpuName(rp.name));
            if (!match) return;
            const rpPrice = rp.pricing.community_spot || rp.pricing.community_on_demand;
            const vaPrice = match.pricing.rentable_min || match.pricing.min;
            if (rpPrice && vaPrice) {
                comparisons.push({
                    name: rp.name, vram: rp.vram_gb,
                    runpodPrice: rpPrice, vastPrice: vaPrice,
                    savings: (rpPrice - vaPrice) / rpPrice * 100,
                });
            }
        });
        comparisons.sort((a, b) => b.savings - a.savings);

        const allData = buildCombined();
        const cheapest = [...allData].sort((a, b) => (a.bestPrice || 999) - (b.bestPrice || 999)).slice(0, 12);

        const savingsRows = comparisons.filter(c => c.savings > 0).slice(0, 20).map(c => `
            <tr>
                <td><strong>${escapeHtml(c.name)}</strong></td>
                <td>${c.vram || '–'} GB</td>
                <td class="price price-high">${fmtPriceRaw(c.runpodPrice)}</td>
                <td>${formatPrice(c.vastPrice)}</td>
                <td><span class="savings">${c.savings.toFixed(0)}% cheaper</span></td>
            </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:#a0a0a0;padding:20px">Not enough matched GPU types to compare</td></tr>';

        const cheapestRows = cheapest.map(g => `
            <tr>
                <td><strong>${escapeHtml(g.name)}</strong></td>
                <td><span class="badge badge-${g.provider}">${g.provider}</span></td>
                <td>${g.vram || '–'} GB</td>
                <td>${formatPrice(g.bestPrice)}</td>
                <td>${g.vram && g.bestPrice ? `$${(g.bestPrice / g.vram).toFixed(4)}/GB` : '–'}</td>
            </tr>`).join('');

        document.getElementById('deals-container').innerHTML = `
            <div class="deals-section">
                <div class="deals-section-header">🎯 Top Savings — Vast.ai vs RunPod</div>
                <table>
                    <thead><tr>
                        <th>GPU Model</th><th>VRAM</th>
                        <th>RunPod Price</th><th>Vast.ai Price</th><th>Savings</th>
                    </tr></thead>
                    <tbody>${savingsRows}</tbody>
                </table>
            </div>
            <div class="deals-section">
                <div class="deals-section-header">💰 Cheapest GPUs (All Providers)</div>
                <table>
                    <thead><tr>
                        <th>GPU Model</th><th>Provider</th><th>VRAM</th>
                        <th>Price/Hour</th><th>Price/GB</th>
                    </tr></thead>
                    <tbody>${cheapestRows}</tbody>
                </table>
            </div>`;
    }

    // ── Price history ──────────────────────────────────────────────────────

    async function toggleHistory(safeId, gpuName, provider) {
        const el = document.getElementById(`hist-${safeId}`);
        const chev = document.getElementById(`chev-${safeId}`);
        if (!el) return;
        const isOpen = el.classList.contains('open');

        if (isOpen) {
            el.classList.remove('open');
            chev.style.transform = '';
            if (expandedHistories.has(safeId)) {
                expandedHistories.get(safeId).destroy();
                expandedHistories.delete(safeId);
            }
            return;
        }

        el.classList.add('open');
        chev.style.transform = 'rotate(90deg)';

        if (expandedHistories.has(safeId)) return; // already loaded

        const safeName = gpuName.replace(/[^a-zA-Z0-9]/g, '_');
        try {
            const r = await fetch(`rollups/gpu/history/${safeName}.json`);
            if (!r.ok) throw new Error('not found');
            const data = await r.json();

            if (!data.history || data.history.length < 2) {
                el.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:20px;font-size:0.85em;">Only one data point — history builds up daily.</div>';
                return;
            }

            const labels = data.history.map(h => h.date);

            // Determine which price series exist
            const datasets = [];
            const addSeries = (label, key, colorIdx) => {
                const vals = data.history.map(h => h[key] != null ? +h[key].toFixed(4) : null);
                if (vals.some(v => v != null)) {
                    datasets.push({
                        label, data: vals,
                        borderColor: CHART_COLORS[colorIdx % CHART_COLORS.length],
                        backgroundColor: CHART_COLORS[colorIdx % CHART_COLORS.length] + '22',
                        tension: 0.3, fill: false, pointRadius: 3, spanGaps: true,
                    });
                }
            };

            addSeries('RunPod Spot',        'community_spot',      0);
            addSeries('RunPod Community OD', 'community_on_demand', 1);
            addSeries('RunPod Secure OD',    'secure_on_demand',    2);
            addSeries('Vast.ai Min',         'vast_min',            3);
            addSeries('Vast.ai Avg',         'vast_avg',            4);

            if (!datasets.length) {
                el.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:20px;font-size:0.85em;">No price data in history.</div>';
                return;
            }

            el.innerHTML = '<div style="height:200px"><canvas></canvas></div>';
            const ctx = el.querySelector('canvas').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#e0e0e0', boxWidth: 10, font: { size: 11 } } },
                        tooltip: { callbacks: { label: c => `${c.dataset.label}: $${c.parsed.y?.toFixed(4) ?? 'N/A'}/hr` } },
                    },
                    scales: {
                        x: { ticks: { color: '#a0a0a0', maxTicksLimit: 10 }, grid: { color: '#2a2f3e' } },
                        y: { ticks: { color: '#a0a0a0', callback: v => `$${v.toFixed(3)}` }, grid: { color: '#2a2f3e' } },
                    },
                },
            });
            expandedHistories.set(safeId, chart);
        } catch (e) {
            el.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:20px;font-size:0.85em;">No history yet — check back after the first daily run.</div>';
        }
    }

    // ── Event listeners ────────────────────────────────────────────────────

    document.getElementById('search').addEventListener('input', e => {
        currentSearch = e.target.value.toLowerCase();
        applyFilters();
    });

    document.querySelectorAll('#vramChips .chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('#vramChips .chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentVram = chip.dataset.vram;
            applyFilters();
        });
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentView = tab.dataset.view;
            document.querySelectorAll('.view').forEach(v => {
                v.classList.toggle('active', v.id === currentView + '-view');
            });
            renderCurrentView();
        });
    });

    loadData();
</script>
</body>
</html>
