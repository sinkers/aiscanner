<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Rental Pricing</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* ── Nav ── */
        .site-nav {
            display: flex; align-items: center; gap: 12px; padding: 10px 0 18px;
        }
        .site-nav a {
            color: #a0a0a0; text-decoration: none; font-size: 0.9em;
            display: flex; align-items: center; gap: 5px; transition: color 0.2s;
        }
        .site-nav a:hover { color: #06b6d4; }
        .site-nav .breadcrumb-sep { color: #3a3f52; }
        .site-nav .current { color: #e0e0e0; font-weight: 500; }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #0891b2 0%, #059669 100%);
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(8,145,178,0.3);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; color: white; }
        .subtitle { font-size: 1.1em; opacity: 0.9; color: white; }

        /* ── Stats ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a2f3e;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #06b6d4 0%, #4ade80 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { font-size: 0.9em; color: #a0a0a0; margin-top: 5px; }

        /* ── Controls ── */
        .controls {
            background: #1a1f2e;
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2a2f3e;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.82em; color: #a0a0a0; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        input[type="text"] {
            padding: 10px 14px;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            background: #0f1419;
            color: #e0e0e0;
            font-size: 0.95em;
            min-width: 220px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: #06b6d4; }

        /* ── Chips ── */
        .chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid #2a2f3e;
            background: #0f1419;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
        }
        .chip:hover { border-color: #06b6d4; color: #e0e0e0; }
        .chip.active { background: rgba(6,182,212,0.15); border-color: #06b6d4; color: #06b6d4; }

        /* ── Tabs ── */
        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
            border-bottom: 2px solid #2a2f3e;
        }
        .tab {
            padding: 12px 24px; background: transparent; border: none;
            color: #a0a0a0; cursor: pointer; font-size: 1em; font-weight: 500;
            transition: all 0.3s; border-bottom: 3px solid transparent; margin-bottom: -2px;
        }
        .tab:hover { color: #e0e0e0; }
        .tab.active { color: #06b6d4; border-bottom-color: #06b6d4; }

        .view { display: none; }
        .view.active { display: block; }

        /* ── Tables ── */
        table {
            width: 100%; background: #1a1f2e; border-radius: 12px; overflow: hidden;
            border-collapse: collapse; border: 1px solid #2a2f3e;
        }
        th {
            background: #252b3d; padding: 14px 15px; text-align: left;
            font-weight: 600; color: #06b6d4; white-space: nowrap;
        }
        td { padding: 12px 15px; border-top: 1px solid #1e2436; vertical-align: top; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .price { font-family: 'Courier New', monospace; color: #4ade80; }
        .price-range {
            font-size: 0.8em; color: #6b7280; margin-top: 2px;
            font-family: 'Courier New', monospace;
        }
        .price-high { color: #ef4444; }
        .savings { color: #4ade80; font-weight: 600; }

        /* ── Provider badges ── */
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.78em; font-weight: 600; white-space: nowrap;
            border: 1px solid; margin: 1px 2px;
        }

        /* ── Pricing tier badges ── */
        .tier-badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 0.78em; font-weight: 600; white-space: nowrap;
            border: 1px solid; margin: 2px 3px 2px 0;
            cursor: default;
        }

        /* ── Sortable columns ── */
        th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: 28px;
        }
        th.sortable:hover { color: #67e8f9; }
        th.sort-asc::after  { content: ' ↑'; color: #4ade80; }
        th.sort-desc::after { content: ' ↓'; color: #4ade80; }

        /* ── Best deals ── */
        .deals-section {
            background: #1a1f2e; border-radius: 12px; border: 1px solid #2a2f3e;
            overflow: hidden; margin-bottom: 20px;
        }
        .deals-section-header {
            padding: 16px 20px; background: #252b3d;
            font-size: 1em; font-weight: 600; color: #06b6d4;
        }

        /* ── Class / Variant accordion ── */
        .class-row {
            cursor: pointer;
            background: #1a1f2e;
        }
        .class-row:hover td { background: rgba(6,182,212,0.04); }
        .class-row td { font-weight: 600; }

        .variant-row {
            cursor: pointer;
        }
        .variant-row td {
            padding-left: 40px;
            background: #161b27;
        }
        .variant-row:hover td { background: rgba(6,182,212,0.04); }

        .detail-row td {
            padding: 0 !important;
            border-top: none !important;
        }
        .detail-content {
            display: none;
            background: #0f1419;
            padding: 16px 20px 16px 40px;
            border-top: 1px solid #2a2f3e;
        }
        .detail-content.open { display: block; }

        .chevron {
            display: inline-block;
            transition: transform 0.2s;
            color: #06b6d4;
            margin-right: 6px;
            font-size: 0.8em;
        }
        .chevron.open { transform: rotate(90deg); }

        .class-name {
            font-size: 1.05em;
        }
        .variant-count {
            font-size: 0.8em;
            color: #6b7280;
            font-weight: 400;
            margin-left: 8px;
        }

        /* Provider comparison table inside detail */
        .provider-table {
            width: 100%; border-collapse: collapse; font-size: 0.88em;
            background: #1a1f2e; border-radius: 8px; overflow: hidden;
            margin-bottom: 16px;
        }
        .provider-table th {
            padding: 8px 12px; text-align: left; font-weight: 600; color: #06b6d4;
            background: #252b3d; font-size: 0.9em;
        }
        .provider-table td { padding: 8px 12px; border-top: 1px solid #1e2436; }
        .provider-table tr:first-child td { border-top: none; }
        .provider-table .cheapest { color: #4ade80; font-weight: 700; }

        .breakdown-label {
            font-size: 0.8em; color: #a0a0a0; text-transform: uppercase;
            letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;
        }

        .timestamp-bar {
            color: #a0a0a0; font-size: 0.82em; text-align: right;
            margin-bottom: 16px;
        }

        .no-data {
            text-align: center; color: #a0a0a0; padding: 60px 20px;
        }

        .vram-tag {
            display: inline-block;
            background: rgba(6,182,212,0.1);
            color: #67e8f9;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 0.82em;
            font-weight: 500;
        }

        @media (max-width: 900px) {
            table { font-size: 0.82em; }
            .deals-grid { grid-template-columns: 1fr !important; }
            .variant-row td { padding-left: 24px; }
            .detail-content { padding-left: 24px; }
        }
    </style>
</head>
<body>
<div class="container">
    <nav class="site-nav">
        <a href="index.html">← Home</a>
        <span class="breadcrumb-sep">/</span>
        <span class="current">GPU Rental Pricing</span>
    </nav>

    <header>
        <h1>GPU Rental Pricing</h1>
        <p class="subtitle">Spot, on-demand, and reserved rates across all GPU rental providers</p>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="stat-classes">–</div>
            <div class="stat-label">GPU Classes</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-providers">–</div>
            <div class="stat-label">Providers</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-listings">–</div>
            <div class="stat-label">Total Listings</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-cheapest">–</div>
            <div class="stat-label">Cheapest Spot /hr</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Search</label>
            <input type="text" id="search" placeholder="e.g. H100, A100, RTX 4090...">
        </div>
        <div class="control-group">
            <label>VRAM</label>
            <div class="chips" id="vramChips">
                <div class="chip active" data-vram="all">All</div>
                <div class="chip" data-vram="8-16">8–16 GB</div>
                <div class="chip" data-vram="16-32">16–32 GB</div>
                <div class="chip" data-vram="32-64">32–64 GB</div>
                <div class="chip" data-vram="64+">64+ GB</div>
            </div>
        </div>
        <div class="control-group">
            <label>Provider</label>
            <div class="chips" id="providerChips">
                <div class="chip active" data-provider="all">All</div>
            </div>
        </div>
    </div>

    <div class="timestamp-bar" id="timestamp"></div>

    <div class="tabs">
        <button class="tab active" data-view="classes">By GPU Class</button>
        <button class="tab" data-view="deals">Best Deals</button>
    </div>

    <div id="classes-view" class="view active">
        <div id="classes-container">
            <div class="no-data">Loading...</div>
        </div>
    </div>

    <div id="deals-view" class="view">
        <div id="deals-container"></div>
    </div>
</div>

<script>
    const CHART_COLORS = ['#06b6d4','#4ade80','#f59e0b','#ef4444','#a855f7','#667eea','#f97316','#84cc16','#ec4899','#14b8a6'];

    // ── Provider badge colours ────────────────────────────────────────────────
    const PROVIDER_PALETTE = [
        { bg: 'rgba(102,126,234,0.15)', color: '#667eea', border: 'rgba(102,126,234,0.3)' },
        { bg: 'rgba(168,85,247,0.15)',  color: '#a855f7', border: 'rgba(168,85,247,0.3)' },
        { bg: 'rgba(6,182,212,0.15)',   color: '#06b6d4', border: 'rgba(6,182,212,0.3)'  },
        { bg: 'rgba(74,222,128,0.15)',  color: '#4ade80', border: 'rgba(74,222,128,0.3)' },
        { bg: 'rgba(245,158,11,0.15)',  color: '#f59e0b', border: 'rgba(245,158,11,0.3)' },
        { bg: 'rgba(239,68,68,0.15)',   color: '#ef4444', border: 'rgba(239,68,68,0.3)'  },
        { bg: 'rgba(249,115,22,0.15)',  color: '#f97316', border: 'rgba(249,115,22,0.3)' },
        { bg: 'rgba(132,204,22,0.15)',  color: '#84cc16', border: 'rgba(132,204,22,0.3)' },
    ];
    const _providerColorCache = {};
    function providerColor(name) {
        if (!_providerColorCache[name]) {
            const idx = Object.keys(_providerColorCache).length % PROVIDER_PALETTE.length;
            _providerColorCache[name] = PROVIDER_PALETTE[idx];
        }
        return _providerColorCache[name];
    }
    function badgeHtml(name) {
        const c = providerColor(name);
        return `<span class="badge" style="background:${c.bg};color:${c.color};border-color:${c.border}">${esc(name)}</span>`;
    }

    // ── Pricing tier definitions ─────────────────────────────────────────────
    const TIER_META = {
        spot:     { label: 'Spot',      color: '#f59e0b', bg: 'rgba(245,158,11,0.12)', border: 'rgba(245,158,11,0.35)' },
        demand:   { label: 'On-Demand', color: '#06b6d4', bg: 'rgba(6,182,212,0.12)',  border: 'rgba(6,182,212,0.35)' },
        reserved: { label: 'Reserved',  color: '#a855f7', bg: 'rgba(168,85,247,0.12)', border: 'rgba(168,85,247,0.35)' },
    };

    const FIELD_DEFS = [
        // RunPod
        { field: 'community_spot',      tier: 'spot',     label: 'Community Spot'      },
        { field: 'secure_spot',         tier: 'spot',     label: 'Secure Spot'         },
        { field: 'minimum_bid',         tier: 'spot',     label: 'Minimum Bid'         },
        { field: 'community_on_demand', tier: 'demand',   label: 'Community On-Demand' },
        { field: 'secure_on_demand',    tier: 'demand',   label: 'Secure On-Demand'    },
        { field: 'uninterruptable',     tier: 'reserved', label: 'Uninterruptable'     },
        // Shared (Vast.ai, Lambda Labs, TensorDock, Vultr, Azure, etc.)
        { field: 'spot_min',            tier: 'spot',     label: 'Spot Min'            },
        { field: 'spot_avg',            tier: 'spot',     label: 'Spot Avg'            },
        { field: 'rentable_min',        tier: 'spot',     label: 'Rentable Min'        },
        { field: 'demand_min',          tier: 'demand',   label: 'On-Demand Min'       },
        { field: 'demand_avg',          tier: 'demand',   label: 'On-Demand Avg'       },
        { field: 'rentable_avg',        tier: 'demand',   label: 'Rentable Avg'        },
        { field: 'min',                 tier: 'spot',     label: 'Market Min'          },
        { field: 'avg',                 tier: 'demand',   label: 'Market Avg'          },
        { field: 'max',                 tier: 'reserved', label: 'Market Max'          },
        { field: 'instance_price',      tier: 'demand',   label: 'Instance Price'      },
    ];

    function getTierSummary(pricing) {
        const result = { spot: null, demand: null, reserved: null };
        for (const { field, tier } of FIELD_DEFS) {
            const v = pricing[field];
            if (v != null && v > 0) {
                result[tier] = result[tier] == null ? +v : Math.min(result[tier], +v);
            }
        }
        return result;
    }

    function getAllTierPrices(pricing) {
        return FIELD_DEFS
            .filter(d => pricing[d.field] != null && pricing[d.field] > 0)
            .map(d => ({ ...d, price: +pricing[d.field] }));
    }

    function getPriceMin(pricing) {
        const all = getAllTierPrices(pricing);
        return all.length ? Math.min(...all.map(t => t.price)) : null;
    }
    function getPriceMax(pricing) {
        const all = getAllTierPrices(pricing);
        return all.length ? Math.max(...all.map(t => t.price)) : null;
    }

    // ── GPU class parsing ────────────────────────────────────────────────────
    //
    // Normalises raw GPU names from different providers into a canonical
    // { gpuClass, variant } so we can group the same chip together.

    // Explicit overrides for names that regex can't handle cleanly.
    // Maps a normalised lowercase prefix to { gpuClass, variantPrefix }.
    const GPU_CLASS_OVERRIDES = [
        // PRO 6000 MIG slices (no "RTX" prefix in some providers)
        { match: 'pro 6000 mig',          gpuClass: 'RTX PRO 6000', variantPrefix: 'MIG' },
        // TensorDock concatenated names
        { match: 'geforcertx2060super',    gpuClass: 'RTX 2060',     variantPrefix: 'SUPER' },
        { match: 'geforcertx',             gpuClass: null,            variantPrefix: null, parse: n => {
            // "GEFORCERTX3090" → class "RTX 3090", "GEFORCERTX3080TI" → "RTX 3080 Ti"
            const m = n.match(/GEFORCERTX(\d{4})(TI|SUPER)?$/i);
            if (!m) return null;
            const suffix = m[2] ? ' ' + m[2][0].toUpperCase() + m[2].slice(1).toLowerCase() : '';
            return { gpuClass: 'RTX ' + m[1] + suffix, variant: null };
        }},
        { match: 'quadrortx',             gpuClass: null, variantPrefix: null, parse: n => {
            const m = n.match(/QUADRORTX(\d+)/i);
            return m ? { gpuClass: 'Quadro RTX ' + m[1], variant: null } : null;
        }},
        { match: 'rtx6000ada',            gpuClass: 'RTX 6000 Ada',  variantPrefix: null },
        { match: 'rtxa',                  gpuClass: null, variantPrefix: null, parse: n => {
            const m = n.match(/RTXA(\d+)/i);
            return m ? { gpuClass: 'RTX A' + m[1], variant: null } : null;
        }},
    ];

    function parseGpuClass(rawName) {
        let name = rawName.trim();

        // Check explicit overrides first (handles TensorDock concatenated names, MIG slices)
        const nameLower = name.toLowerCase();
        for (const ov of GPU_CLASS_OVERRIDES) {
            if (nameLower.startsWith(ov.match) || nameLower === ov.match) {
                if (ov.parse) {
                    const result = ov.parse(name);
                    if (result) return { gpuClass: result.gpuClass, variant: result.variant };
                }
                if (ov.gpuClass) {
                    // Extract any remaining suffix as variant info
                    const remainder = name.substring(name.toLowerCase().indexOf(ov.match) + ov.match.length).trim();
                    const variantParts = [];
                    if (ov.variantPrefix) variantParts.push(ov.variantPrefix);
                    if (remainder) variantParts.push(remainder);
                    return { gpuClass: ov.gpuClass, variant: variantParts.join(' ') || null };
                }
            }
        }

        // Strip common prefixes
        name = name.replace(/^(NVIDIA|AMD|Intel)\s+/i, '');
        name = name.replace(/^GeForce\s+/i, '');
        name = name.replace(/\s+/g, ' ');

        const variantParts = [];

        // Form factor / workstation suffixes → variant
        const formMatch = name.match(/\b(MaxQ|WK|WS|SFF|Blackwell|Hopper|Tensor)\b/i);
        if (formMatch) {
            variantParts.push(formMatch[1]);
            name = name.replace(formMatch[0], '').trim();
        }

        // MIG slice pattern: "MIG 24GB", "MIG 48GB"
        const migMatch = name.match(/\bMIG\s*(\d+\s*GB)?/i);
        if (migMatch) {
            variantParts.push(migMatch[0].trim());
            name = name.replace(migMatch[0], '').trim();
        }

        // Interface: SXM, SXM4, SXM5, PCIe, NVLink, HBM2e, HBM3
        const ifaceMatch = name.match(/\b(SXM\d*|PCIe?|NVLink|HBM\d?\w*)\b/i);
        if (ifaceMatch) {
            variantParts.push(ifaceMatch[1].toUpperCase().replace('PCIE', 'PCIe'));
            name = name.replace(ifaceMatch[0], '').trim();
        }

        // Memory spec: "80GB", "40 GB"
        const memMatch = name.match(/\b(\d+)\s*GB\b/i);
        if (memMatch) {
            variantParts.push(memMatch[1] + 'GB');
            name = name.replace(memMatch[0], '').trim();
        }

        // Generation suffix that stays in the class name: Ada, SUPER, Ti, S (single letter)
        // "RTX 4080 SUPER" → class "RTX 4080 SUPER" (SUPER is a different GPU)
        // "RTX PRO 6000 S" → class "RTX PRO 6000", variant "S"
        // BUT "RTX 4070S Ti" → class "RTX 4070S Ti" (Vast.ai shorthand for SUPER)
        const trailingSuffix = name.match(/\s+(S|WS|WK)$/i);
        if (trailingSuffix) {
            variantParts.unshift(trailingSuffix[1].toUpperCase());
            name = name.replace(trailingSuffix[0], '').trim();
        }

        // Clean up
        name = name.replace(/\s*[-–]\s*$/, '').trim();
        name = name.replace(/\s+/g, ' ');

        // Normalise casing: "RTX Pro 6000" → "RTX PRO 6000"
        name = name.replace(/\bPro\b/g, 'PRO');
        // "Ti" consistency
        name = name.replace(/\bti\b/gi, 'Ti');

        return {
            gpuClass: name || rawName,
            variant: variantParts.length ? variantParts.join(' ') : null,
        };
    }

    // ── State ────────────────────────────────────────────────────────────────

    let gpuData = null;
    let currentVram = 'all';
    let currentSearch = '';
    let currentProvider = 'all';
    let currentView = 'classes';
    let sortColumn = 'cheapest';
    let sortDirection = 'asc';
    let expandedClasses = new Set();
    let expandedVariants = new Set();    // variantId
    let chartInstances = new Map();

    // ── Helpers ──────────────────────────────────────────────────────────────

    function fmtP(p) { return p == null ? '–' : `$${(+p).toFixed(3)}/hr`; }
    function fmtPHtml(p) { return p == null ? '–' : `<span class="price">${fmtP(p)}</span>`; }
    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function safeId(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

    // ── Data loading ─────────────────────────────────────────────────────────

    async function loadData() {
        try {
            const r = await fetch('rollups/gpu/latest.json');
            if (!r.ok) throw new Error('not found');
            gpuData = await r.json();
            updateStats();
            updateTimestamp();
            populateProviderChips();
            renderCurrentView();
        } catch (e) {
            document.getElementById('classes-container').innerHTML =
                '<div class="no-data">GPU pricing data not available yet — it will appear after the first daily Lambda run with GPU API keys configured.<br><br>Run <code>make configure-gpu</code> to set API keys, then <code>make invoke</code> to trigger collection.</div>';
        }
    }

    function getProviderKeys() {
        if (!gpuData) return [];
        return Object.keys(gpuData).filter(k => Array.isArray(gpuData[k]?.gpus));
    }

    // ── Build flat GPU list from all providers ───────────────────────────────

    function buildFlat() {
        const out = [];
        getProviderKeys().forEach(key => {
            const provData = gpuData[key];
            const providerLabel = provData.name || key;
            (provData.gpus || []).forEach(g => {
                const pricing = g.pricing || {};
                const tiers = getTierSummary(pricing);
                const { gpuClass, variant } = parseGpuClass(g.name);
                const vram = Math.round(g.vram_gb || g.vram || 0) || 0;
                out.push({
                    provider: key,
                    providerLabel,
                    rawName: g.name,
                    gpuClass,
                    variant,
                    vram,
                    pricing,
                    tiers,
                    priceMin: getPriceMin(pricing),
                    priceMax: getPriceMax(pricing),
                    availability: g.available !== undefined
                        ? (g.available ? 'Available' : 'Unavailable')
                        : (g.rentable_offers != null
                            ? `${g.rentable_offers}/${g.total_offers || '?'} rentable`
                            : '–'),
                    raw: g,
                });
            });
        });
        return out;
    }

    // ── Build class hierarchy ────────────────────────────────────────────────
    //
    // Returns: [ { className, variants: [ { variantKey, vram, entries: [...] } ] } ]

    function buildHierarchy(flatList) {
        const classMap = {};

        flatList.forEach(gpu => {
            const cls = gpu.gpuClass;
            if (!classMap[cls]) classMap[cls] = {};

            // Variant key combines interface variant with VRAM
            const vk = gpu.variant
                ? `${gpu.variant}${gpu.vram ? ' ' + gpu.vram + 'GB' : ''}`
                : (gpu.vram ? gpu.vram + 'GB' : 'Standard');
            // Deduplicate the "80GB 80GB" case
            const variantKey = vk.replace(/(\d+GB)\s+\1/g, '$1');

            if (!classMap[cls][variantKey]) classMap[cls][variantKey] = [];
            classMap[cls][variantKey].push(gpu);
        });

        // Convert to sorted array
        const classes = Object.entries(classMap).map(([className, variants]) => {
            const variantArr = Object.entries(variants).map(([variantKey, entries]) => {
                const vrams = entries.map(e => e.vram).filter(v => v > 0);
                const maxVram = vrams.length ? Math.max(...vrams) : 0;
                return { variantKey, vram: maxVram, entries };
            });
            // Sort variants: highest VRAM first
            variantArr.sort((a, b) => b.vram - a.vram);
            return { className, variants: variantArr };
        });

        // Sort classes by name, putting well-known GPUs first
        const GPU_ORDER = ['H200','H100','A100','L40S','L40','L4','A10G','A10','RTX 6000','RTX 5090','RTX 5080','RTX 4090','RTX 4080','RTX 3090','RTX 3080','RTX A6000','RTX A5000','RTX A4000','V100','T4','MI300X','MI250X','MI210'];
        classes.sort((a, b) => {
            const ai = GPU_ORDER.findIndex(g => a.className.includes(g));
            const bi = GPU_ORDER.findIndex(g => b.className.includes(g));
            if (ai >= 0 && bi >= 0) return ai - bi;
            if (ai >= 0) return -1;
            if (bi >= 0) return 1;
            return a.className.localeCompare(b.className);
        });

        return classes;
    }

    // ── Filtering ────────────────────────────────────────────────────────────

    function applyFilters(flatList) {
        return flatList.filter(gpu => {
            if (currentSearch && !gpu.rawName.toLowerCase().includes(currentSearch)
                && !gpu.gpuClass.toLowerCase().includes(currentSearch)) return false;
            if (currentProvider !== 'all' && gpu.provider !== currentProvider) return false;
            if (currentVram !== 'all') {
                const v = gpu.vram || 0;
                if (currentVram === '8-16'  && (v < 8  || v >= 16)) return false;
                if (currentVram === '16-32' && (v < 16 || v >= 32)) return false;
                if (currentVram === '32-64' && (v < 32 || v >= 64)) return false;
                if (currentVram === '64+'   && v < 64) return false;
            }
            return true;
        });
    }

    // ── Stats + UI setup ─────────────────────────────────────────────────────

    function updateStats() {
        const flat = buildFlat();
        const classes = new Set(flat.map(g => g.gpuClass));
        const spotPrices = flat.map(g => g.tiers.spot).filter(p => p != null && p > 0);
        const cheapest = spotPrices.length ? `$${Math.min(...spotPrices).toFixed(3)}` : '–';

        document.getElementById('stat-classes').textContent = classes.size;
        document.getElementById('stat-providers').textContent = getProviderKeys().length;
        document.getElementById('stat-listings').textContent = flat.length;
        document.getElementById('stat-cheapest').textContent = cheapest;
    }

    function updateTimestamp() {
        if (!gpuData?.generated_at) return;
        const d = new Date(gpuData.generated_at);
        document.getElementById('timestamp').textContent = `Last updated: ${d.toLocaleString()}`;
    }

    function populateProviderChips() {
        const chipsEl = document.getElementById('providerChips');
        getProviderKeys().forEach(key => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.dataset.provider = key;
            chip.textContent = gpuData[key].name || key;
            chipsEl.appendChild(chip);
        });
    }

    function renderCurrentView() {
        if (currentView === 'classes') renderClasses();
        if (currentView === 'deals') renderDeals();
    }

    // ── Sorting ──────────────────────────────────────────────────────────────

    function thHtml(label, col) {
        const cls = sortColumn === col ? `sortable sort-${sortDirection}` : 'sortable';
        return `<th class="${cls}" onclick="setSort('${col}')">${label}</th>`;
    }

    function setSort(col) {
        sortDirection = (sortColumn === col && sortDirection === 'asc') ? 'desc' : 'asc';
        sortColumn = col;
        renderClasses();
    }

    // ── Class-based main view ────────────────────────────────────────────────

    function renderClasses() {
        const flat = buildFlat();
        const filtered = applyFilters(flat);
        const hierarchy = buildHierarchy(filtered);

        if (!hierarchy.length) {
            document.getElementById('classes-container').innerHTML =
                '<div class="no-data">No GPUs match the current filters.</div>';
            return;
        }

        // Sort classes by the selected column
        hierarchy.forEach(cls => {
            cls._cheapest = Math.min(...cls.variants.flatMap(v => v.entries.map(e => e.priceMin)).filter(p => p != null));
            cls._maxVram = Math.max(...cls.variants.map(v => v.vram), 0);
            cls._providerCount = new Set(cls.variants.flatMap(v => v.entries.map(e => e.providerLabel))).size;
            cls._variantCount = cls.variants.length;
            cls._listingCount = cls.variants.reduce((sum, v) => sum + v.entries.length, 0);
        });

        const dir = sortDirection === 'asc' ? 1 : -1;
        hierarchy.sort((a, b) => {
            switch (sortColumn) {
                case 'name': return dir * a.className.localeCompare(b.className);
                case 'vram': return dir * (a._maxVram - b._maxVram);
                case 'providers': return dir * (a._providerCount - b._providerCount);
                case 'cheapest': return dir * ((a._cheapest ?? 9999) - (b._cheapest ?? 9999));
                default: return 0;
            }
        });

        let rows = '';
        hierarchy.forEach(cls => {
            const clsId = safeId(cls.className);
            const isOpen = expandedClasses.has(cls.className);
            const providerNames = [...new Set(cls.variants.flatMap(v => v.entries.map(e => e.providerLabel)))];
            const cheapest = cls._cheapest < 9999 ? cls._cheapest : null;
            const maxPrice = Math.max(...cls.variants.flatMap(v => v.entries.map(e => e.priceMax)).filter(p => p != null));
            const hasRange = cheapest != null && maxPrice != null && maxPrice - cheapest > 0.001;

            rows += `
                <tr class="class-row" onclick="toggleClass('${esc(cls.className)}')">
                    <td>
                        <span class="chevron ${isOpen ? 'open' : ''}" id="cls-chev-${clsId}">&#9654;</span>
                        <span class="class-name">${esc(cls.className)}</span>
                        <span class="variant-count">${cls._variantCount} variant${cls._variantCount !== 1 ? 's' : ''}, ${cls._listingCount} listing${cls._listingCount !== 1 ? 's' : ''}</span>
                    </td>
                    <td>${cls._maxVram ? `<span class="vram-tag">${cls._maxVram} GB</span>` : '–'}</td>
                    <td>${providerNames.slice(0, 4).map(n => badgeHtml(n)).join('')}${providerNames.length > 4 ? ` <span style="color:#6b7280;font-size:0.8em">+${providerNames.length - 4}</span>` : ''}</td>
                    <td>
                        ${cheapest != null ? `<span class="price">${fmtP(cheapest)}</span>` : '–'}
                        ${hasRange ? `<div class="price-range">up to ${fmtP(maxPrice)}</div>` : ''}
                    </td>
                </tr>
            `;

            if (isOpen) {
                cls.variants.forEach(v => {
                    const vId = safeId(cls.className + '_' + v.variantKey);
                    const isVarOpen = expandedVariants.has(vId);
                    const vCheapest = Math.min(...v.entries.map(e => e.priceMin).filter(p => p != null));
                    const vMax = Math.max(...v.entries.map(e => e.priceMax).filter(p => p != null));
                    const vHasRange = vCheapest < 9999 && vMax > 0 && vMax - vCheapest > 0.001;

                    rows += `
                        <tr class="variant-row" onclick="event.stopPropagation(); toggleVariant('${vId}', '${esc(cls.className)}', '${esc(v.variantKey)}')">
                            <td>
                                <span class="chevron ${isVarOpen ? 'open' : ''}" id="var-chev-${vId}">&#9654;</span>
                                ${esc(v.variantKey)}
                            </td>
                            <td>${v.vram ? `<span class="vram-tag">${v.vram} GB</span>` : '–'}</td>
                            <td>${v.entries.map(e => badgeHtml(e.providerLabel)).join('')}</td>
                            <td>
                                ${vCheapest < 9999 ? `<span class="price">${fmtP(vCheapest)}</span>` : '–'}
                                ${vHasRange ? `<div class="price-range">up to ${fmtP(vMax)}</div>` : ''}
                            </td>
                        </tr>
                        <tr class="detail-row">
                            <td colspan="4">
                                <div class="detail-content ${isVarOpen ? 'open' : ''}" id="detail-${vId}"></div>
                            </td>
                        </tr>
                    `;

                    if (isVarOpen) {
                        // Render detail content after table is in DOM
                        requestAnimationFrame(() => renderVariantDetail(vId, v.entries));
                    }
                });
            }
        });

        document.getElementById('classes-container').innerHTML = `
            <table>
                <thead>
                    <tr>
                        ${thHtml('GPU Class', 'name')}
                        ${thHtml('VRAM', 'vram')}
                        ${thHtml('Providers', 'providers')}
                        ${thHtml('Price Range', 'cheapest')}
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
            <div style="margin-top:10px;font-size:0.8em;color:#6b7280;text-align:right">
                Click a GPU class to see variants (SXM/PCIe, memory sizes). Click a variant to compare provider pricing and view price history.
            </div>
        `;

        // Re-render any open variant details
        hierarchy.forEach(cls => {
            if (!expandedClasses.has(cls.className)) return;
            cls.variants.forEach(v => {
                const vId = safeId(cls.className + '_' + v.variantKey);
                if (expandedVariants.has(vId)) {
                    renderVariantDetail(vId, v.entries);
                }
            });
        });
    }

    // ── Toggle class expansion ───────────────────────────────────────────────

    function toggleClass(className) {
        if (expandedClasses.has(className)) {
            expandedClasses.delete(className);
        } else {
            expandedClasses.add(className);
        }
        renderClasses();
    }

    // ── Toggle variant expansion ─────────────────────────────────────────────

    function toggleVariant(vId, className, variantKey) {
        if (expandedVariants.has(vId)) {
            if (chartInstances.has(vId)) {
                chartInstances.get(vId).destroy();
                chartInstances.delete(vId);
            }
            expandedVariants.delete(vId);
        } else {
            expandedVariants.add(vId);
        }
        renderClasses();
    }

    // ── Render variant detail: provider comparison + chart ────────────────────

    function renderVariantDetail(vId, entries) {
        const el = document.getElementById(`detail-${vId}`);
        if (!el) return;

        // Sort entries by cheapest price
        const sorted = [...entries].sort((a, b) => (a.priceMin ?? 9999) - (b.priceMin ?? 9999));
        const cheapestPrice = sorted[0]?.priceMin;

        // Provider comparison table
        const providerRows = sorted.map(e => {
            const t = e.tiers;
            const isCheapest = e.priceMin === cheapestPrice && sorted.length > 1;
            const spotCls = t.spot != null && t.spot === cheapestPrice ? 'cheapest' : '';
            const demandCls = t.demand != null && t.demand === cheapestPrice ? 'cheapest' : '';
            return `<tr>
                <td>${badgeHtml(e.providerLabel)}${isCheapest ? ' <span style="color:#4ade80;font-size:0.75em">CHEAPEST</span>' : ''}</td>
                <td class="${spotCls}" style="font-family:monospace">${t.spot != null ? fmtP(t.spot) : '–'}</td>
                <td class="${demandCls}" style="font-family:monospace">${t.demand != null ? fmtP(t.demand) : '–'}</td>
                <td style="font-family:monospace">${t.reserved != null ? fmtP(t.reserved) : '–'}</td>
                <td style="color:#a0a0a0;font-size:0.9em">${e.availability}</td>
            </tr>`;
        }).join('');

        el.innerHTML = `
            <div class="breakdown-label">Provider Comparison</div>
            <table class="provider-table">
                <thead><tr>
                    <th>Provider</th>
                    <th style="color:${TIER_META.spot.color}">Spot</th>
                    <th style="color:${TIER_META.demand.color}">On-Demand</th>
                    <th style="color:${TIER_META.reserved.color}">Reserved</th>
                    <th>Availability</th>
                </tr></thead>
                <tbody>${providerRows}</tbody>
            </table>
            <div id="chart-wrap-${vId}">
                <div style="text-align:center;color:#a0a0a0;padding:12px;font-size:0.85em">Loading price history...</div>
            </div>
        `;

        // Load history charts for all providers
        loadVariantHistory(vId, entries);
    }

    // ── Load and render price history chart across all providers ──────────────

    async function loadVariantHistory(vId, entries) {
        const chartWrap = document.getElementById(`chart-wrap-${vId}`);
        if (!chartWrap) return;

        const LEGACY_PROVIDERS = new Set(['runpod', 'vast']);
        const allDatasets = [];
        const allLabels = new Set();
        let colorIdx = 0;

        // Fetch history for each provider's entry
        const historyPromises = entries.map(async (entry) => {
            const safeName = entry.rawName.replace(/[^a-zA-Z0-9]/g, '_');
            const histPath = LEGACY_PROVIDERS.has(entry.provider)
                ? `rollups/gpu/history/${safeName}.json`
                : `rollups/gpu/history/${entry.provider}/${safeName}.json`;

            try {
                const r = await fetch(histPath);
                if (!r.ok) return null;
                const data = await r.json();
                if (!data.history || data.history.length < 2) return null;
                return { provider: entry.providerLabel, history: data.history };
            } catch { return null; }
        });

        const results = (await Promise.all(historyPromises)).filter(Boolean);

        if (!results.length) {
            chartWrap.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:12px;font-size:0.85em">No price history yet — builds up daily.</div>';
            return;
        }

        // Collect all dates
        results.forEach(r => r.history.forEach(h => allLabels.add(h.date)));
        const labels = [...allLabels].sort();

        // For each provider, pick the most representative price field (prefer demand_min or avg)
        const PRICE_FIELDS = ['demand_min', 'demand_avg', 'avg', 'secure_on_demand', 'community_on_demand', 'min', 'spot_min', 'spot_avg'];

        results.forEach(r => {
            // Find best price field
            let bestField = null;
            for (const f of PRICE_FIELDS) {
                if (r.history.some(h => h[f] != null && h[f] > 0)) { bestField = f; break; }
            }
            if (!bestField) return;

            const dateMap = {};
            r.history.forEach(h => { dateMap[h.date] = h[bestField]; });

            const color = CHART_COLORS[colorIdx % CHART_COLORS.length];
            colorIdx++;

            allDatasets.push({
                label: r.provider,
                data: labels.map(d => dateMap[d] != null ? +dateMap[d].toFixed(4) : null),
                borderColor: color,
                backgroundColor: color + '22',
                tension: 0.3, fill: false, pointRadius: 3, spanGaps: true,
            });
        });

        if (!allDatasets.length) {
            chartWrap.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:12px;font-size:0.85em">No price data in history.</div>';
            return;
        }

        chartWrap.innerHTML = `
            <div class="breakdown-label" style="margin-top:8px">Price History — All Providers</div>
            <div style="height:240px"><canvas></canvas></div>
        `;

        const ctx = chartWrap.querySelector('canvas').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: allDatasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { labels: { color: '#e0e0e0', boxWidth: 10, font: { size: 11 } } },
                    tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y != null ? '$' + c.parsed.y.toFixed(4) + '/hr' : 'N/A'}` } },
                },
                scales: {
                    x: { ticks: { color: '#a0a0a0', maxTicksLimit: 10 }, grid: { color: '#2a2f3e' } },
                    y: { ticks: { color: '#a0a0a0', callback: v => `$${v.toFixed(3)}` }, grid: { color: '#2a2f3e' } },
                },
            },
        });

        if (chartInstances.has(vId)) chartInstances.get(vId).destroy();
        chartInstances.set(vId, chart);
    }

    // ── Best Deals view ──────────────────────────────────────────────────────

    function renderDeals() {
        const flat = buildFlat();
        const filtered = applyFilters(flat);

        // Section 1: price spread for same GPU class across multiple providers
        const byClass = {};
        filtered.forEach(g => {
            if (!byClass[g.gpuClass]) byClass[g.gpuClass] = [];
            if (g.priceMin != null) byClass[g.gpuClass].push(g);
        });

        const spreads = Object.entries(byClass)
            .filter(([, entries]) => {
                const providers = new Set(entries.map(e => e.provider));
                return providers.size >= 2;
            })
            .map(([cls, entries]) => {
                const sorted = [...entries].sort((a, b) => a.priceMin - b.priceMin);
                const cheapest = sorted[0];
                const priciest = sorted[sorted.length - 1];
                return {
                    name: cls,
                    vram: Math.max(...entries.map(e => e.vram)),
                    cheapest, priciest,
                    spread: Math.round((priciest.priceMin - cheapest.priceMin) / cheapest.priceMin * 100),
                    providerCount: new Set(entries.map(e => e.provider)).size,
                };
            })
            .filter(s => s.spread > 0)
            .sort((a, b) => b.spread - a.spread);

        // Section 2: spot vs on-demand savings
        const spotSavings = filtered
            .filter(g => g.tiers.spot != null && g.tiers.demand != null)
            .map(g => ({
                ...g,
                saving: g.tiers.demand - g.tiers.spot,
                savingPct: Math.round((g.tiers.demand - g.tiers.spot) / g.tiers.demand * 100),
            }))
            .filter(g => g.saving > 0.0001)
            .sort((a, b) => b.savingPct - a.savingPct);

        // Section 3: cheapest spot + on-demand
        const cheapestSpot = [...filtered]
            .filter(g => g.tiers.spot != null)
            .sort((a, b) => a.tiers.spot - b.tiers.spot)
            .slice(0, 10);

        const cheapestOD = [...filtered]
            .filter(g => g.tiers.demand != null)
            .sort((a, b) => a.tiers.demand - b.tiers.demand)
            .slice(0, 10);

        const spreadRows = spreads.slice(0, 15).map(s => `
            <tr>
                <td><strong>${esc(s.name)}</strong></td>
                <td>${s.vram || '–'} GB</td>
                <td style="text-align:center">${s.providerCount}</td>
                <td>${fmtPHtml(s.cheapest.priceMin)} ${badgeHtml(s.cheapest.providerLabel)}</td>
                <td class="price-high">${fmtP(s.priciest.priceMin)} ${badgeHtml(s.priciest.providerLabel)}</td>
                <td><span class="savings">${s.spread}% spread</span></td>
            </tr>`).join('')
            || '<tr><td colspan="6" style="text-align:center;color:#6b7280;padding:20px">No GPU types found across multiple providers yet.</td></tr>';

        const spotRows = spotSavings.slice(0, 12).map(g => `
            <tr>
                <td><strong>${esc(g.gpuClass)}</strong> <span style="color:#6b7280;font-size:0.85em">${g.variant || ''}</span></td>
                <td>${badgeHtml(g.providerLabel)}</td>
                <td>${g.vram || '–'} GB</td>
                <td><span style="color:#f59e0b;font-family:monospace">${fmtP(g.tiers.spot)}</span></td>
                <td><span style="color:#06b6d4;font-family:monospace">${fmtP(g.tiers.demand)}</span></td>
                <td><span class="savings">Save ${g.savingPct}% going spot</span></td>
            </tr>`).join('')
            || '<tr><td colspan="6" style="text-align:center;color:#6b7280;padding:20px">No providers with both spot and on-demand pricing yet.</td></tr>';

        const cheapSpotRows = cheapestSpot.map(g => `
            <tr>
                <td><strong>${esc(g.gpuClass)}</strong> <span style="color:#6b7280;font-size:0.85em">${g.variant || ''}</span></td>
                <td>${badgeHtml(g.providerLabel)}</td>
                <td>${g.vram || '–'} GB</td>
                <td><span style="color:#f59e0b;font-family:monospace">${fmtP(g.tiers.spot)}</span></td>
                <td style="color:#6b7280">${g.vram && g.tiers.spot ? `$${(g.tiers.spot / g.vram).toFixed(4)}/GB` : '–'}</td>
            </tr>`).join('');

        const cheapODRows = cheapestOD.map(g => `
            <tr>
                <td><strong>${esc(g.gpuClass)}</strong> <span style="color:#6b7280;font-size:0.85em">${g.variant || ''}</span></td>
                <td>${badgeHtml(g.providerLabel)}</td>
                <td>${g.vram || '–'} GB</td>
                <td><span style="color:#06b6d4;font-family:monospace">${fmtP(g.tiers.demand)}</span></td>
                <td style="color:#6b7280">${g.vram && g.tiers.demand ? `$${(g.tiers.demand / g.vram).toFixed(4)}/GB` : '–'}</td>
            </tr>`).join('');

        document.getElementById('deals-container').innerHTML = `
            <div class="deals-section">
                <div class="deals-section-header">Price Spread — Same GPU Class, Different Providers</div>
                <table>
                    <thead><tr>
                        <th>GPU Class</th><th>VRAM</th><th style="text-align:center">Providers</th>
                        <th>Cheapest</th><th>Priciest</th><th>Spread</th>
                    </tr></thead>
                    <tbody>${spreadRows}</tbody>
                </table>
            </div>
            <div class="deals-section">
                <div class="deals-section-header">Spot vs On-Demand Savings</div>
                <table>
                    <thead><tr>
                        <th>GPU</th><th>Provider</th><th>VRAM</th>
                        <th>Spot</th><th>On-Demand</th><th>Savings</th>
                    </tr></thead>
                    <tbody>${spotRows}</tbody>
                </table>
            </div>
            <div class="deals-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                <div class="deals-section" style="margin-bottom:0">
                    <div class="deals-section-header">Cheapest Spot Pricing</div>
                    <table>
                        <thead><tr><th>GPU</th><th>Provider</th><th>VRAM</th><th>Spot/hr</th><th>$/GB VRAM</th></tr></thead>
                        <tbody>${cheapSpotRows || '<tr><td colspan="5" style="text-align:center;color:#6b7280;padding:20px">No spot pricing data yet.</td></tr>'}</tbody>
                    </table>
                </div>
                <div class="deals-section" style="margin-bottom:0">
                    <div class="deals-section-header">Cheapest On-Demand</div>
                    <table>
                        <thead><tr><th>GPU</th><th>Provider</th><th>VRAM</th><th>OD/hr</th><th>$/GB VRAM</th></tr></thead>
                        <tbody>${cheapODRows || '<tr><td colspan="5" style="text-align:center;color:#6b7280;padding:20px">No on-demand pricing data yet.</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
    }

    // ── Event listeners ──────────────────────────────────────────────────────

    document.getElementById('search').addEventListener('input', e => {
        currentSearch = e.target.value.toLowerCase();
        renderCurrentView();
    });

    document.getElementById('vramChips').addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.querySelectorAll('#vramChips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentVram = chip.dataset.vram;
        renderCurrentView();
    });

    document.getElementById('providerChips').addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.querySelectorAll('#providerChips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentProvider = chip.dataset.provider || 'all';
        renderCurrentView();
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentView = tab.dataset.view;
            document.querySelectorAll('.view').forEach(v => {
                v.classList.toggle('active', v.id === currentView + '-view');
            });
            renderCurrentView();
        });
    });

    loadData();
</script>
</body>
</html>
