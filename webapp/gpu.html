<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Rental Pricing</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* ── Nav ── */
        .site-nav {
            display: flex; align-items: center; gap: 12px; padding: 10px 0 18px;
        }
        .site-nav a {
            color: #a0a0a0; text-decoration: none; font-size: 0.9em;
            display: flex; align-items: center; gap: 5px; transition: color 0.2s;
        }
        .site-nav a:hover { color: #06b6d4; }
        .site-nav .breadcrumb-sep { color: #3a3f52; }
        .site-nav .current { color: #e0e0e0; font-weight: 500; }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #0891b2 0%, #059669 100%);
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(8,145,178,0.3);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; color: white; }
        .subtitle { font-size: 1.1em; opacity: 0.9; color: white; }

        /* ── Stats ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a2f3e;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #06b6d4 0%, #4ade80 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { font-size: 0.9em; color: #a0a0a0; margin-top: 5px; }

        /* ── Controls ── */
        .controls {
            background: #1a1f2e;
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2a2f3e;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.82em; color: #a0a0a0; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        input[type="text"] {
            padding: 10px 14px;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            background: #0f1419;
            color: #e0e0e0;
            font-size: 0.95em;
            min-width: 220px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: #06b6d4; }

        /* ── Chips ── */
        .chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid #2a2f3e;
            background: #0f1419;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
        }
        .chip:hover { border-color: #06b6d4; color: #e0e0e0; }
        .chip.active { background: rgba(6,182,212,0.15); border-color: #06b6d4; color: #06b6d4; }

        /* ── Tabs ── */
        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
            border-bottom: 2px solid #2a2f3e;
        }
        .tab {
            padding: 12px 24px; background: transparent; border: none;
            color: #a0a0a0; cursor: pointer; font-size: 1em; font-weight: 500;
            transition: all 0.3s; border-bottom: 3px solid transparent; margin-bottom: -2px;
        }
        .tab:hover { color: #e0e0e0; }
        .tab.active { color: #06b6d4; border-bottom-color: #06b6d4; }

        .view { display: none; }
        .view.active { display: block; }

        /* ── Tables ── */
        table {
            width: 100%; background: #1a1f2e; border-radius: 12px; overflow: hidden;
            border-collapse: collapse; border: 1px solid #2a2f3e;
        }
        th {
            background: #252b3d; padding: 14px 15px; text-align: left;
            font-weight: 600; color: #06b6d4; white-space: nowrap;
        }
        td { padding: 12px 15px; border-top: 1px solid #1e2436; vertical-align: top; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .price { font-family: 'Courier New', monospace; color: #4ade80; }
        .price-range {
            font-size: 0.8em; color: #6b7280; margin-top: 2px;
            font-family: 'Courier New', monospace;
        }
        .price-high { color: #ef4444; }
        .savings { color: #4ade80; font-weight: 600; }

        /* ── Provider badges ── */
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.78em; font-weight: 600; white-space: nowrap;
            border: 1px solid;
        }

        /* ── Pricing tier badges ── */
        .tier-badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 0.78em; font-weight: 600; white-space: nowrap;
            border: 1px solid; margin: 2px 3px 2px 0;
            cursor: default;
        }

        /* ── Sortable columns ── */
        th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: 28px;
        }
        th.sortable:hover { color: #67e8f9; }
        th.sort-asc::after  { content: ' ↑'; color: #4ade80; }
        th.sort-desc::after { content: ' ↓'; color: #4ade80; }

        /* ── Best deals ── */
        .deals-section {
            background: #1a1f2e; border-radius: 12px; border: 1px solid #2a2f3e;
            overflow: hidden; margin-bottom: 20px;
        }
        .deals-section-header {
            padding: 16px 20px; background: #252b3d;
            font-size: 1em; font-weight: 600; color: #06b6d4;
        }

        /* ── History / drill-down ── */
        .gpu-row { cursor: pointer; }
        .gpu-history-row td { padding: 0 !important; border-top: none !important; }
        .gpu-history-content {
            display: none;
            background: #0f1419;
            padding: 16px 20px;
            border-top: 1px solid #2a2f3e;
        }
        .gpu-history-content.open { display: block; }
        .gpu-chevron {
            display: inline-block;
            transition: transform 0.2s;
            color: #06b6d4;
            margin-right: 6px;
        }

        .breakdown-label {
            font-size: 0.8em; color: #a0a0a0; text-transform: uppercase;
            letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;
        }
        .breakdown-table {
            width: 100%; border-collapse: collapse; font-size: 0.88em;
            background: #1a1f2e; border-radius: 8px; overflow: hidden;
            margin-bottom: 16px;
        }
        .breakdown-table th {
            padding: 8px 12px; text-align: left; font-weight: 600; color: #06b6d4;
            background: #252b3d; font-size: 0.9em;
        }
        .breakdown-table td { padding: 8px 12px; border-top: 1px solid #1e2436; }

        .timestamp-bar {
            color: #a0a0a0; font-size: 0.82em; text-align: right;
            margin-bottom: 16px;
        }

        .no-data {
            text-align: center; color: #a0a0a0; padding: 60px 20px;
        }

        @media (max-width: 900px) {
            table { font-size: 0.82em; }
            .deals-grid { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>
<div class="container">
    <nav class="site-nav">
        <a href="index.html">← Home</a>
        <span class="breadcrumb-sep">/</span>
        <span class="current">GPU Rental Pricing</span>
    </nav>

    <header>
        <h1>🖥️ GPU Rental Pricing</h1>
        <p class="subtitle">Spot, on-demand, and reserved rates across all GPU rental providers</p>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="stat-total">–</div>
            <div class="stat-label">GPU Models</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-providers">–</div>
            <div class="stat-label">Providers</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-listings">–</div>
            <div class="stat-label">Total Listings</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-cheapest">–</div>
            <div class="stat-label">Cheapest Spot /hr</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Search</label>
            <input type="text" id="search" placeholder="e.g. RTX 4090, A100...">
        </div>
        <div class="control-group">
            <label>VRAM</label>
            <div class="chips" id="vramChips">
                <div class="chip active" data-vram="all">All</div>
                <div class="chip" data-vram="8-16">8–16 GB</div>
                <div class="chip" data-vram="16-32">16–32 GB</div>
                <div class="chip" data-vram="32-64">32–64 GB</div>
                <div class="chip" data-vram="64+">64+ GB</div>
            </div>
        </div>
        <div class="control-group">
            <label>Provider</label>
            <div class="chips" id="providerChips">
                <div class="chip active" data-provider="all">All</div>
            </div>
        </div>
    </div>

    <div class="timestamp-bar" id="timestamp"></div>

    <div class="tabs">
        <button class="tab active" data-view="combined">All GPUs</button>
        <button class="tab" data-view="deals">Best Deals</button>
    </div>

    <div id="combined-view" class="view active">
        <div id="combined-container">
            <div class="no-data">Loading...</div>
        </div>
    </div>

    <div id="deals-view" class="view">
        <div id="deals-container"></div>
    </div>
</div>

<script>
    const CHART_COLORS = ['#06b6d4','#4ade80','#f59e0b','#ef4444','#a855f7','#667eea','#f97316','#84cc16'];

    // ── Provider badge colours ────────────────────────────────────────────────
    const PROVIDER_PALETTE = [
        { bg: 'rgba(102,126,234,0.15)', color: '#667eea', border: 'rgba(102,126,234,0.3)' },
        { bg: 'rgba(168,85,247,0.15)',  color: '#a855f7', border: 'rgba(168,85,247,0.3)' },
        { bg: 'rgba(6,182,212,0.15)',   color: '#06b6d4', border: 'rgba(6,182,212,0.3)'  },
        { bg: 'rgba(74,222,128,0.15)',  color: '#4ade80', border: 'rgba(74,222,128,0.3)' },
        { bg: 'rgba(245,158,11,0.15)',  color: '#f59e0b', border: 'rgba(245,158,11,0.3)' },
        { bg: 'rgba(239,68,68,0.15)',   color: '#ef4444', border: 'rgba(239,68,68,0.3)'  },
        { bg: 'rgba(249,115,22,0.15)',  color: '#f97316', border: 'rgba(249,115,22,0.3)' },
        { bg: 'rgba(132,204,22,0.15)',  color: '#84cc16', border: 'rgba(132,204,22,0.3)' },
    ];
    const _providerColorCache = {};
    function providerColor(name) {
        if (!_providerColorCache[name]) {
            const idx = Object.keys(_providerColorCache).length % PROVIDER_PALETTE.length;
            _providerColorCache[name] = PROVIDER_PALETTE[idx];
        }
        return _providerColorCache[name];
    }
    function badgeHtml(name) {
        const c = providerColor(name);
        return `<span class="badge" style="background:${c.bg};color:${c.color};border-color:${c.border}">${escapeHtml(name)}</span>`;
    }

    // ── Pricing tier definitions ─────────────────────────────────────────────
    //
    // Each pricing field from the API is mapped to one of three conceptual tiers:
    //   spot     — interruptible / bid-based, lowest price, may be preempted
    //   demand   — stable on-demand, pay-per-use, no preemption risk
    //   reserved — always-on / guaranteed, typically highest price
    //
    // The UI surfaces these tiers with distinct colours so users can compare
    // like-for-like across providers.

    const TIER_META = {
        spot:     { label: 'Spot',     color: '#f59e0b', bg: 'rgba(245,158,11,0.12)', border: 'rgba(245,158,11,0.35)',  desc: 'Interruptible — lowest cost, may be preempted'        },
        demand:   { label: 'On-Demand', color: '#06b6d4', bg: 'rgba(6,182,212,0.12)',  border: 'rgba(6,182,212,0.35)',   desc: 'Stable, pay-per-use — no preemption risk'             },
        reserved: { label: 'Reserved',  color: '#a855f7', bg: 'rgba(168,85,247,0.12)', border: 'rgba(168,85,247,0.35)', desc: 'Always-on, guaranteed availability — highest price'   },
    };

    // Map each raw API field to its tier and a human label
    const FIELD_DEFS = [
        // ── RunPod — uses provider-specific field names ─────────────────────
        { field: 'community_spot',      tier: 'spot',     label: 'Community Spot'      },
        { field: 'secure_spot',         tier: 'spot',     label: 'Secure Spot'         },
        { field: 'minimum_bid',         tier: 'spot',     label: 'Minimum Bid'         },
        { field: 'community_on_demand', tier: 'demand',   label: 'Community On-Demand' },
        { field: 'secure_on_demand',    tier: 'demand',   label: 'Secure On-Demand'    },
        { field: 'uninterruptable',     tier: 'reserved', label: 'Uninterruptable'     },

        // ── Shared field names (Vast.ai, Lambda Labs, TensorDock, Vultr, Azure) ──
        // spot / interruptible
        { field: 'spot_min',            tier: 'spot',     label: 'Spot Min'            },
        { field: 'spot_avg',            tier: 'spot',     label: 'Spot Avg'            },
        { field: 'rentable_min',        tier: 'spot',     label: 'Rentable Min'        },
        // on-demand / stable
        { field: 'demand_min',          tier: 'demand',   label: 'On-Demand Min'       },
        { field: 'demand_avg',          tier: 'demand',   label: 'On-Demand Avg'       },
        { field: 'rentable_avg',        tier: 'demand',   label: 'Rentable Avg'        },
        // overall market range
        { field: 'min',                 tier: 'spot',     label: 'Market Min'          },
        { field: 'avg',                 tier: 'demand',   label: 'Market Avg'          },
        { field: 'max',                 tier: 'reserved', label: 'Market Max'          },
        // Lambda Labs full-instance price (shown in breakdown, not tier summary)
        { field: 'instance_price',      tier: 'demand',   label: 'Instance Price'      },
    ];

    // Returns array of { field, label, price, tier } for all non-null prices
    function getAllTierPrices(pricing) {
        return FIELD_DEFS
            .filter(d => pricing[d.field] != null && pricing[d.field] > 0)
            .map(d => ({ ...d, price: +pricing[d.field] }));
    }

    // Returns { spot, demand, reserved } — each is the minimum price in that tier (or null)
    function getTierSummary(pricing) {
        const result = { spot: null, demand: null, reserved: null };
        for (const { field, tier } of FIELD_DEFS) {
            const v = pricing[field];
            if (v != null && v > 0) {
                result[tier] = result[tier] == null ? +v : Math.min(result[tier], +v);
            }
        }
        return result;
    }

    // Average of the per-tier minimums that exist (spot, demand, reserved)
    function getAvgPrice(pricing) {
        const vals = Object.values(getTierSummary(pricing)).filter(v => v != null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
    }

    // Absolute cheapest price across all fields
    function getPriceMin(pricing) {
        const all = getAllTierPrices(pricing);
        return all.length ? Math.min(...all.map(t => t.price)) : null;
    }

    // Absolute most expensive price across all fields
    function getPriceMax(pricing) {
        const all = getAllTierPrices(pricing);
        return all.length ? Math.max(...all.map(t => t.price)) : null;
    }

    // ── State ────────────────────────────────────────────────────────────────

    let gpuData     = null;
    let filteredData = [];
    let currentVram = 'all';
    let currentSearch = '';
    let currentProvider = 'all';
    let currentView = 'combined';
    let sortColumn = 'avgPrice';
    let sortDirection = 'asc';
    let expandedHistories = new Map();   // safeId → Chart instance

    // ── Data loading ─────────────────────────────────────────────────────────

    async function loadData() {
        try {
            const r = await fetch('rollups/gpu/latest.json');
            if (!r.ok) throw new Error('not found');
            gpuData = await r.json();
            updateStats();
            updateTimestamp();
            applyFilters();
        } catch (e) {
            document.getElementById('combined-container').innerHTML =
                '<div class="no-data">GPU pricing data not available yet — it will appear after the first daily Lambda run with GPU API keys configured.<br><br>Run <code>make configure-gpu</code> to set API keys, then <code>make invoke</code> to trigger collection.</div>';
        }
    }

    // Returns all provider keys whose value contains a `gpus` array
    function getProviderKeys() {
        if (!gpuData) return [];
        return Object.keys(gpuData).filter(k => Array.isArray(gpuData[k]?.gpus));
    }

    function updateStats() {
        if (!gpuData) return;
        const providerKeys = getProviderKeys();
        const allGpus = buildCombined();
        const uniqueModels = new Set(allGpus.map(g => normalizeGpuName(g.name))).size;
        const spotPrices = allGpus.map(g => g.tiers.spot).filter(p => p != null && p > 0);
        const cheapest = spotPrices.length ? `$${Math.min(...spotPrices).toFixed(3)}` : '–';

        document.getElementById('stat-total').textContent = uniqueModels;
        document.getElementById('stat-providers').textContent = providerKeys.length;
        document.getElementById('stat-listings').textContent = allGpus.length;
        document.getElementById('stat-cheapest').textContent = cheapest;

        // Populate provider filter chips dynamically
        const chipsEl = document.getElementById('providerChips');
        const existing = new Set([...chipsEl.querySelectorAll('.chip')].map(c => c.dataset.provider));
        providerKeys.forEach(key => {
            if (existing.has(key)) return;
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.dataset.provider = key;
            chip.textContent = gpuData[key].name || key;
            chipsEl.appendChild(chip);
        });
    }

    function updateTimestamp() {
        if (!gpuData?.generated_at) return;
        const d = new Date(gpuData.generated_at);
        document.getElementById('timestamp').textContent = `Last updated: ${d.toLocaleString()}`;
    }

    function normalizeGpuName(n) {
        return n.toLowerCase().replace(/[\s\-_]+/g, '').replace(/nvidia|amd/g, '');
    }

    // ── Build combined GPU list from all providers ────────────────────────────

    function buildCombined() {
        const out = [];
        getProviderKeys().forEach(key => {
            const provData = gpuData[key];
            const providerLabel = provData.name || key;
            (provData.gpus || []).forEach(g => {
                const pricing = g.pricing || {};
                const tiers = getTierSummary(pricing);
                out.push({
                    provider: key,
                    providerLabel,
                    name: g.name,
                    vram: Math.round(g.vram_gb || g.vram || 0) || 0,
                    pricing,
                    tiers,
                    avgPrice:  getAvgPrice(pricing),
                    priceMin:  getPriceMin(pricing),
                    priceMax:  getPriceMax(pricing),
                    availability: g.available !== undefined
                        ? (g.available ? 'Available' : 'Unavailable')
                        : (g.rentable_offers != null
                            ? `${g.rentable_offers}/${g.total_offers || '?'} rentable`
                            : '–'),
                    raw: g,
                });
            });
        });
        return out;
    }

    // ── Filtering ────────────────────────────────────────────────────────────

    function applyFilters() {
        const all = buildCombined();
        filteredData = all.filter(gpu => {
            if (currentSearch && !gpu.name.toLowerCase().includes(currentSearch)) return false;
            if (currentProvider !== 'all' && gpu.provider !== currentProvider) return false;
            if (currentVram !== 'all') {
                const v = gpu.vram || 0;
                if (currentVram === '8-16'  && (v < 8  || v >= 16)) return false;
                if (currentVram === '16-32' && (v < 16 || v >= 32)) return false;
                if (currentVram === '32-64' && (v < 32 || v >= 64)) return false;
                if (currentVram === '64+'   && v < 64) return false;
            }
            return true;
        });
        renderCurrentView();
    }

    function renderCurrentView() {
        if (currentView === 'combined') renderCombined();
        if (currentView === 'deals')    renderDeals();
    }

    // ── Formatting helpers ───────────────────────────────────────────────────

    function fmtP(p) {
        if (p == null) return '–';
        return `$${(+p).toFixed(3)}/hr`;
    }
    function fmtPHtml(p) {
        if (p == null) return '–';
        return `<span class="price">${fmtP(p)}</span>`;
    }
    function escapeHtml(t) {
        const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
    }

    // ── Sorting ──────────────────────────────────────────────────────────────

    function sortData(data) {
        const dir = sortDirection === 'asc' ? 1 : -1;
        return [...data].sort((a, b) => {
            switch (sortColumn) {
                case 'name':     return dir * a.name.localeCompare(b.name);
                case 'provider': return dir * a.provider.localeCompare(b.provider);
                case 'vram':     return dir * ((a.vram || 0) - (b.vram || 0));
                case 'avgPrice': return dir * ((a.avgPrice ?? 9999) - (b.avgPrice ?? 9999));
                default:         return 0;
            }
        });
    }

    function thHtml(label, col) {
        const cls = sortColumn === col ? `sortable sort-${sortDirection}` : 'sortable';
        return `<th class="${cls}" onclick="setSort('${col}')">${label}</th>`;
    }

    function setSort(col) {
        sortDirection = (sortColumn === col && sortDirection === 'asc') ? 'desc' : 'asc';
        sortColumn = col;
        renderCombined();
    }

    // ── Tier badge HTML ──────────────────────────────────────────────────────

    function tierBadgeHtml(tierKey, price) {
        const m = TIER_META[tierKey];
        return `<span class="tier-badge" title="${m.desc}" style="background:${m.bg};color:${m.color};border-color:${m.border}">${m.label} ${fmtP(price)}</span>`;
    }

    function tierBadgesHtml(tiers) {
        return Object.entries(tiers)
            .filter(([, p]) => p != null)
            .map(([k, p]) => tierBadgeHtml(k, p))
            .join('') || '<span style="color:#6b7280">–</span>';
    }

    // ── Combined (main) view ─────────────────────────────────────────────────

    function renderCombined() {
        const sorted = sortData(filteredData);
        if (!sorted.length) {
            document.getElementById('combined-container').innerHTML =
                '<div class="no-data">No GPUs match the current filters.</div>';
            return;
        }

        const rows = sorted.map(gpu => {
            const safeId = (gpu.provider + '_' + gpu.name).replace(/[^a-zA-Z0-9]/g, '_');

            // Avg price with min–max range below
            let avgHtml = '–';
            if (gpu.avgPrice != null) {
                const hasRange = gpu.priceMin != null && gpu.priceMax != null
                              && gpu.priceMax - gpu.priceMin > 0.0001;
                avgHtml = `<span class="price">${fmtP(gpu.avgPrice)}</span>`
                    + (hasRange
                        ? `<div class="price-range">${fmtP(gpu.priceMin)} – ${fmtP(gpu.priceMax)}</div>`
                        : '');
            }

            return `
                <tr class="gpu-row" onclick="toggleHistory('${safeId}','${escapeHtml(gpu.name)}','${gpu.provider}')" title="Click to see pricing breakdown and history">
                    <td>
                        <span class="gpu-chevron" id="chev-${safeId}">&#9654;</span>
                        <strong>${escapeHtml(gpu.name)}</strong>
                    </td>
                    <td>${badgeHtml(gpu.providerLabel)}</td>
                    <td>${gpu.vram ? gpu.vram + ' GB' : '–'}</td>
                    <td>${avgHtml}</td>
                    <td>${tierBadgesHtml(gpu.tiers)}</td>
                    <td style="color:#a0a0a0;font-size:0.9em">${gpu.availability}</td>
                </tr>
                <tr class="gpu-history-row">
                    <td colspan="6">
                        <div class="gpu-history-content" id="hist-${safeId}">
                            <div style="text-align:center;color:#a0a0a0;padding:16px;font-size:0.85em">Loading…</div>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');

        document.getElementById('combined-container').innerHTML = `
            <table>
                <thead>
                    <tr>
                        ${thHtml('GPU Model', 'name')}
                        ${thHtml('Provider', 'provider')}
                        ${thHtml('VRAM', 'vram')}
                        ${thHtml('Avg Price', 'avgPrice')}
                        <th>Pricing Tiers</th>
                        <th>Availability</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
            <div style="margin-top:10px;font-size:0.8em;color:#6b7280;text-align:right">
                Avg Price = mean of available tier minimums (Spot / On-Demand / Reserved). Range shows cheapest–priciest individual tier. Click any row for full breakdown.
            </div>
        `;
    }

    // ── Best Deals view ──────────────────────────────────────────────────────

    function renderDeals() {
        const allData = buildCombined();

        // Section 1: price spread for same GPU across multiple providers (avg price)
        const byModel = {};
        allData.forEach(g => {
            const key = normalizeGpuName(g.name);
            if (!byModel[key]) byModel[key] = { name: g.name, vram: g.vram, entries: [] };
            if (g.avgPrice != null) byModel[key].entries.push(g);
        });
        const spreads = Object.values(byModel)
            .filter(m => m.entries.length >= 2)
            .map(m => {
                const s = [...m.entries].sort((a, b) => a.avgPrice - b.avgPrice);
                return {
                    name: m.name, vram: m.vram,
                    cheapest: s[0], priciest: s[s.length - 1],
                    spread: Math.round((s[s.length - 1].avgPrice - s[0].avgPrice) / s[0].avgPrice * 100),
                    providerCount: m.entries.length,
                };
            })
            .filter(s => s.spread > 0)
            .sort((a, b) => b.spread - a.spread);

        // Section 2: spot vs on-demand savings for the same GPU+provider
        const spotSavings = allData
            .filter(g => g.tiers.spot != null && g.tiers.demand != null)
            .map(g => ({
                ...g,
                saving:     g.tiers.demand - g.tiers.spot,
                savingPct:  Math.round((g.tiers.demand - g.tiers.spot) / g.tiers.demand * 100),
            }))
            .filter(g => g.saving > 0.0001)
            .sort((a, b) => b.savingPct - a.savingPct);

        // Section 3a: cheapest spot
        const cheapestSpot = [...allData]
            .filter(g => g.tiers.spot != null)
            .sort((a, b) => a.tiers.spot - b.tiers.spot)
            .slice(0, 10);

        // Section 3b: cheapest on-demand
        const cheapestOD = [...allData]
            .filter(g => g.tiers.demand != null)
            .sort((a, b) => a.tiers.demand - b.tiers.demand)
            .slice(0, 10);

        const spreadRows = spreads.slice(0, 15).map(s => `
            <tr>
                <td><strong>${escapeHtml(s.name)}</strong></td>
                <td>${s.vram || '–'} GB</td>
                <td style="text-align:center">${s.providerCount}</td>
                <td>${fmtPHtml(s.cheapest.avgPrice)} ${badgeHtml(s.cheapest.providerLabel)}</td>
                <td class="price-high">${fmtP(s.priciest.avgPrice)} ${badgeHtml(s.priciest.providerLabel)}</td>
                <td><span class="savings">${s.spread}% spread</span></td>
            </tr>`).join('')
            || '<tr><td colspan="6" style="text-align:center;color:#6b7280;padding:20px">No GPU types found across multiple providers yet.</td></tr>';

        const spotRows = spotSavings.slice(0, 12).map(g => `
            <tr>
                <td><strong>${escapeHtml(g.name)}</strong></td>
                <td>${badgeHtml(g.providerLabel)}</td>
                <td>${g.vram || '–'} GB</td>
                <td><span style="color:#f59e0b;font-family:monospace">${fmtP(g.tiers.spot)}</span></td>
                <td><span style="color:#06b6d4;font-family:monospace">${fmtP(g.tiers.demand)}</span></td>
                <td><span class="savings">Save ${g.savingPct}% going spot</span></td>
            </tr>`).join('')
            || '<tr><td colspan="6" style="text-align:center;color:#6b7280;padding:20px">No providers with both spot and on-demand pricing yet.</td></tr>';

        const cheapSpotRows = cheapestSpot.map(g => `
            <tr>
                <td><strong>${escapeHtml(g.name)}</strong></td>
                <td>${badgeHtml(g.providerLabel)}</td>
                <td>${g.vram || '–'} GB</td>
                <td><span style="color:#f59e0b;font-family:monospace">${fmtP(g.tiers.spot)}</span></td>
                <td style="color:#6b7280">${g.vram && g.tiers.spot ? `$${(g.tiers.spot / g.vram).toFixed(4)}/GB` : '–'}</td>
            </tr>`).join('');

        const cheapODRows = cheapestOD.map(g => `
            <tr>
                <td><strong>${escapeHtml(g.name)}</strong></td>
                <td>${badgeHtml(g.providerLabel)}</td>
                <td>${g.vram || '–'} GB</td>
                <td><span style="color:#06b6d4;font-family:monospace">${fmtP(g.tiers.demand)}</span></td>
                <td style="color:#6b7280">${g.vram && g.tiers.demand ? `$${(g.tiers.demand / g.vram).toFixed(4)}/GB` : '–'}</td>
            </tr>`).join('');

        document.getElementById('deals-container').innerHTML = `
            <div class="deals-section">
                <div class="deals-section-header">🎯 Price Spread — Same GPU, Different Providers (avg price)</div>
                <table>
                    <thead><tr>
                        <th>GPU Model</th><th>VRAM</th><th style="text-align:center">Providers</th>
                        <th>Cheapest Avg</th><th>Priciest Avg</th><th>Spread</th>
                    </tr></thead>
                    <tbody>${spreadRows}</tbody>
                </table>
            </div>
            <div class="deals-section">
                <div class="deals-section-header">⚡ Spot vs On-Demand Savings</div>
                <table>
                    <thead><tr>
                        <th>GPU Model</th><th>Provider</th><th>VRAM</th>
                        <th>Spot</th><th>On-Demand</th><th>Savings</th>
                    </tr></thead>
                    <tbody>${spotRows}</tbody>
                </table>
            </div>
            <div class="deals-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                <div class="deals-section" style="margin-bottom:0">
                    <div class="deals-section-header">🟡 Cheapest Spot Pricing</div>
                    <table>
                        <thead><tr><th>GPU</th><th>Provider</th><th>VRAM</th><th>Spot/hr</th><th>$/GB VRAM</th></tr></thead>
                        <tbody>${cheapSpotRows || '<tr><td colspan="5" style="text-align:center;color:#6b7280;padding:20px">No spot pricing data yet.</td></tr>'}</tbody>
                    </table>
                </div>
                <div class="deals-section" style="margin-bottom:0">
                    <div class="deals-section-header">🔵 Cheapest On-Demand</div>
                    <table>
                        <thead><tr><th>GPU</th><th>Provider</th><th>VRAM</th><th>OD/hr</th><th>$/GB VRAM</th></tr></thead>
                        <tbody>${cheapODRows || '<tr><td colspan="5" style="text-align:center;color:#6b7280;padding:20px">No on-demand pricing data yet.</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
    }

    // ── Drill-down: pricing breakdown + history chart ─────────────────────────

    async function toggleHistory(safeId, gpuName, provider) {
        const el   = document.getElementById(`hist-${safeId}`);
        const chev = document.getElementById(`chev-${safeId}`);
        if (!el) return;

        // Close if already open
        if (el.classList.contains('open')) {
            el.classList.remove('open');
            chev.style.transform = '';
            if (expandedHistories.has(safeId)) {
                expandedHistories.get(safeId).destroy();
                expandedHistories.delete(safeId);
            }
            return;
        }

        el.classList.add('open');
        chev.style.transform = 'rotate(90deg)';
        if (expandedHistories.has(safeId)) return; // already loaded

        // Find the GPU record to build the breakdown table
        const gpu = filteredData.find(g =>
            (g.provider + '_' + g.name).replace(/[^a-zA-Z0-9]/g, '_') === safeId
        ) || buildCombined().find(g =>
            (g.provider + '_' + g.name).replace(/[^a-zA-Z0-9]/g, '_') === safeId
        );

        // ── Pricing breakdown table ──────────────────────────────────────────
        let breakdownHtml = '';
        if (gpu) {
            const tierPrices = getAllTierPrices(gpu.pricing);
            if (tierPrices.length) {
                const bdRows = tierPrices.map(t => {
                    const m = TIER_META[t.tier];
                    return `<tr>
                        <td><span class="tier-badge" title="${m.desc}" style="background:${m.bg};color:${m.color};border-color:${m.border}">${m.label}</span></td>
                        <td>${escapeHtml(t.label)}</td>
                        <td style="font-family:monospace;color:#4ade80">${fmtP(t.price)}</td>
                        <td style="color:#6b7280;font-size:0.85em">${m.desc}</td>
                    </tr>`;
                }).join('');

                breakdownHtml = `
                    <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #2a2f3e">
                        <div class="breakdown-label">Current Pricing by Tier</div>
                        <table class="breakdown-table">
                            <thead>
                                <tr>
                                    <th>Tier</th>
                                    <th>Type</th>
                                    <th>Price</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>${bdRows}</tbody>
                        </table>
                    </div>
                `;
            }
        }

        // Show breakdown immediately, then async-load chart
        el.innerHTML = breakdownHtml
            + `<div id="chart-${safeId}"><div style="text-align:center;color:#a0a0a0;padding:12px;font-size:0.85em">Loading price history…</div></div>`;

        // ── History chart ────────────────────────────────────────────────────
        const safeName = gpuName.replace(/[^a-zA-Z0-9]/g, '_');
        const chartEl  = () => document.getElementById(`chart-${safeId}`);

        // RunPod/Vast history lives at the root; new providers have a sub-folder
        const LEGACY_PROVIDERS = new Set(['runpod', 'vast']);
        const histPath = LEGACY_PROVIDERS.has(provider)
            ? `rollups/gpu/history/${safeName}.json`
            : `rollups/gpu/history/${provider}/${safeName}.json`;

        try {
            const r = await fetch(histPath);
            if (!r.ok) throw new Error('not found');
            const data = await r.json();

            if (!data.history || data.history.length < 2) {
                if (chartEl()) chartEl().innerHTML =
                    '<div style="text-align:center;color:#a0a0a0;padding:12px;font-size:0.85em">Only one data point — history builds up daily.</div>';
                return;
            }

            const labels = data.history.map(h => h.date);

            // Map history field names to readable labels (mirrors FIELD_DEFS + history-specific keys)
            const HIST_LABELS = {
                // RunPod
                community_spot:       'Spot (Community)',
                secure_spot:          'Spot (Secure)',
                community_on_demand:  'On-Demand (Community)',
                secure_on_demand:     'On-Demand (Secure)',
                uninterruptable:      'Reserved',
                // Vast.ai
                vast_spot_min:        'Spot Min',
                vast_spot_avg:        'Spot Avg',
                vast_demand_min:      'On-Demand Min',
                vast_demand_avg:      'On-Demand Avg',
                vast_rentable_min:    'Rentable Min',
                vast_min:             'Market Min',
                vast_max:             'Market Max',
                vast_avg:             'Market Avg',
                // Lambda Labs, TensorDock, Vultr, Azure — shared field names
                demand_min:           'On-Demand Min',
                demand_avg:           'On-Demand Avg',
                spot_min:             'Spot Min',
                spot_avg:             'Spot Avg',
                min:                  'Market Min',
                avg:                  'Market Avg',
                max:                  'Market Max',
                instance_price:       'Instance Price',
            };

            const numericKeys = data.history.length > 0
                ? Object.keys(data.history[0]).filter(k =>
                    k !== 'date' && k !== 'provider'
                    && typeof data.history[0][k] === 'number')
                : [];

            const datasets = [];
            numericKeys.forEach((key, idx) => {
                const vals = data.history.map(h => h[key] != null ? +h[key].toFixed(4) : null);
                if (vals.some(v => v != null)) {
                    datasets.push({
                        label: HIST_LABELS[key] || key,
                        data: vals,
                        borderColor: CHART_COLORS[idx % CHART_COLORS.length],
                        backgroundColor: CHART_COLORS[idx % CHART_COLORS.length] + '22',
                        tension: 0.3, fill: false, pointRadius: 3, spanGaps: true,
                    });
                }
            });

            if (!datasets.length) {
                if (chartEl()) chartEl().innerHTML =
                    '<div style="text-align:center;color:#a0a0a0;padding:12px;font-size:0.85em">No price data in history.</div>';
                return;
            }

            if (chartEl()) {
                chartEl().innerHTML = `
                    <div class="breakdown-label" style="margin-top:4px">Price History</div>
                    <div style="height:220px"><canvas></canvas></div>`;
                const ctx   = chartEl().querySelector('canvas').getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { labels: { color: '#e0e0e0', boxWidth: 10, font: { size: 11 } } },
                            tooltip: { callbacks: { label: c => `${c.dataset.label}: $${c.parsed.y?.toFixed(4) ?? 'N/A'}/hr` } },
                        },
                        scales: {
                            x: { ticks: { color: '#a0a0a0', maxTicksLimit: 10 }, grid: { color: '#2a2f3e' } },
                            y: { ticks: { color: '#a0a0a0', callback: v => `$${v.toFixed(3)}` }, grid: { color: '#2a2f3e' } },
                        },
                    },
                });
                expandedHistories.set(safeId, chart);
            }
        } catch (e) {
            if (chartEl()) chartEl().innerHTML =
                '<div style="text-align:center;color:#a0a0a0;padding:12px;font-size:0.85em">No history yet — check back after the first daily run.</div>';
        }
    }

    // ── Event listeners ──────────────────────────────────────────────────────

    document.getElementById('search').addEventListener('input', e => {
        currentSearch = e.target.value.toLowerCase();
        applyFilters();
    });

    document.getElementById('vramChips').addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.querySelectorAll('#vramChips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentVram = chip.dataset.vram;
        applyFilters();
    });

    document.getElementById('providerChips').addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.querySelectorAll('#providerChips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentProvider = chip.dataset.provider || 'all';
        applyFilters();
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentView = tab.dataset.view;
            document.querySelectorAll('.view').forEach(v => {
                v.classList.toggle('active', v.id === currentView + '-view');
            });
            renderCurrentView();
        });
    });

    loadData();
</script>
</body>
</html>
